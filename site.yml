---
- name: V5 Threat Hunt Adversary Emulation Engine
  hosts: windows
  gather_facts: yes

  pre_tasks:
    - name: Dynamically Ingest Raw Threat Actor Matrix Configurations
      ansible.builtin.include_vars:
        file: "vars/mitre_attack_matrix.yml"
        name: raw_matrix
      delegate_to: localhost
      run_once: true

    - name: Flatten and Construct Target Attack Sequence Cache Arrays
      ansible.builtin.set_fact:
        attack_sequence: >-
          {% set target_actor = hostvars['localhost']['selected_actor_id'] | default('G0016') %}
          {% set actor_data = raw_matrix['attack_matrix'][target_actor] | default({}) %}
          {% set processed_list = [] %}
          {% for phase_name, actions in actor_data.items() %}
            {% for action in actions %}
              {% set _ = action.update({'phase': phase_name}) %}
              {% set _ = processed_list.append(action) %}
            {% endfor %}
          {% endfor %}
          {{ processed_list }}
      delegate_to: localhost
      run_once: true

    - name: Distribute Processed Attack Sequences and Initialize Blacklists
      ansible.builtin.set_fact:
        attack_sequence: "{{ hostvars['localhost']['attack_sequence'] }}"
        used_techniques: []

    - name: Establish Patient Zero Control Foothold Points
      ansible.builtin.set_fact:
        compromised_hosts:
          - "{{ groups['windows'] | select('search', 'wks01') | first | default(groups['windows']) }}"
      delegate_to: localhost
      delegate_facts: true
      run_once: true
      when: hostvars['localhost']['compromised_hosts'] is not defined

  roles:
    - users
    - normal_activity
    - engine
