---

# ================================================================

# CYBER RANGE ENGINE - RUN PHASE HANDLER (FINAL PRODUCTION SAFE)

# ================================================================


- name: Normalize phase

  set_fact:

    normalized_phase: "{{ master_loop_phase | string | trim | lower }}"

  tags: engine



- name: DEBUG normalized phase

  debug:

    msg: "Phase={{ normalized_phase }}"

  tags: engine



# ---------------------------------------------------------------

# Evaluate if host is compromised

# ---------------------------------------------------------------


- name: Evaluate Host Foothold Compromise Status

  set_fact:

    is_compromised: "{{ inventory_hostname in (hostvars['localhost']['compromised_hosts'] | default([])) or (inventory_hostname | split('.') | first) in (hostvars['localhost']['compromised_hosts'] | default([])) }}"

  tags: engine



# ---------------------------------------------------------------

# Build phase-specific techniques

# ---------------------------------------------------------------


- name: Build phase-specific technique list

  set_fact:

    phase_techniques: "{{ (attack_sequence | selectattr('phase', 'equalto', normalized_phase) | list) | default([]) }}"

  tags: engine



# ---------------------------------------------------------------

# Build global fallback pool (exclude already used)

# ---------------------------------------------------------------


- name: Build global technique pool

  set_fact:

    global_techniques: "{{ (attack_sequence | rejectattr('technique', 'in', used_techniques | default([])) | list) | default([]) }}"

  tags: engine



# ---------------------------------------------------------------

# Determine number of techniques (SAFE TYPE)

# ---------------------------------------------------------------


- name: Determine number of techniques

  set_fact:

    selected_count: "{{ (1 if attack_behaviour == 'stealthy' else (range(1,3) | random)) | int }}"

  tags: engine



# ---------------------------------------------------------------

# Select techniques (PHASE FIRST → FALLBACK SAFE)

# ---------------------------------------------------------------


- name: Select techniques for execution

  set_fact:

    selected_phase_techniques: "{{ (((phase_techniques if (phase_techniques | length > 0) else global_techniques) | shuffle)[0:(selected_count | int)]) }}"

  tags: engine



# ---------------------------------------------------------------

# DEBUG selection (CRITICAL VISIBILITY)

# ---------------------------------------------------------------


- name: DEBUG selection logic

  debug:

    msg: >-

      Phase={{ normalized_phase }}

      Host={{ inventory_hostname }}

      PhaseTechniques={{ phase_techniques | length }}

      FallbackPool={{ global_techniques | length }}

      SelectedCount={{ selected_count }}

      SelectedActual={{ selected_phase_techniques | length }}

  tags: engine



# ---------------------------------------------------------------

# Execute techniques

# ---------------------------------------------------------------


- name: Execute Cyber Range Techniques

  include_tasks: execute_technique.yml

  vars:

    selected_action: "{{ technique }}"

    current_phase: "{{ normalized_phase }}"

  loop: "{{ selected_phase_techniques }}"

  loop_control:

    loop_var: technique

  when:

    - selected_phase_techniques | length > 0

    - is_compromised | bool

  tags: engine
