---
- name: V5 Threat Hunt Adversary Emulation Engine
  hosts: windows
  gather_facts: yes

  pre_tasks:
    - name: Dynamically Load Selected Threat Actor Datasets
      ansible.builtin.include_vars:
        file: "../vars/chains/{{ hostvars['localhost']['selected_actor_id'] | lower }}_chain.yml"
      delegate_to: localhost
      run_once: true

    - name: Initialize Global Infection Tracking with Patient Zero
      ansible.builtin.set_fact:
        compromised_hosts:
          # Automatically seeds the first workstation (e.g., off-wks01) as the initial foothold
          - "{{ groups['windows'] | select('search', 'wks01') | first | default(groups['windows'][0]) }}"
      delegate_to: localhost
      delegate_facts: true
      run_once: true
      when: hostvars['localhost']['compromised_hosts'] is not defined

  roles:
    - users
    - normal_activity
    - engine
