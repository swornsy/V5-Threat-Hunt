---

# ========================================================================

# MULTI-OS STATEFUL PROCESS ENGINE - DECOUPLED PROCESS LINEAGE (execute_technique.yml)

# ========================================================================


- name: Establish Cross-Platform Host Environment Variables

  set_fact:

    is_windows: "{{ ansible_os_family == 'Windows' }}"

    short_host: "{{ inventory_hostname | split('.') | first }}"

  tags: engine


# ------------------------------------------------------------------------

# DETACHED FORENSIC WORKER ASSURANCE LOOP

# ------------------------------------------------------------------------

- name: "[WINDOWS] Enforce RangeEngine Target Runtime Directory"

  win_file:

    path: C:\ProgramData\RangeEngine

    state: directory

  when: is_windows | bool

  tags: engine


- name: "[WINDOWS] Bootstrap Persistent Background Foothold Engine"

  win_copy:

    src: worker.ps1

    dest: C:\ProgramData\RangeEngine\worker.ps1

  when: is_windows | bool

  tags: engine


- name: "[WINDOWS] Start Hidden Detached User-Space Worker via WMI Engine"

  win_shell: |

    $WorkDir = "C:\ProgramData\RangeEngine"

    $Path = "$WorkDir\worker.ps1"

    $LockFile = "$WorkDir\worker.lock"

    

    $NeedsStart = $true

    if (Test-Path $LockFile) {

        $SavedPID = (Get-Content $LockFile -Raw).Trim()

        $Proc = Get-Process -Id $SavedPID -ErrorAction SilentlyContinue

        if ($Proc -and $Proc.ProcessName -eq "powershell") {

            $NeedsStart = $false

            echo $SavedPID

        }

    }

    

    if ($NeedsStart) {

        if (Test-Path $LockFile) { Remove-Item $LockFile -Force }

        $ResultFile = "$WorkDir\result.txt"

        if (Test-Path $ResultFile) { Remove-Item $ResultFile -Force }

        

        # Break free from WinRM task container boundaries via WMI Process Factory

        $Command = "powershell.exe -NoProfile -ExecutionPolicy Bypass -WindowStyle Hidden -File $Path"

        $InvokeWmi = Invoke-CimMethod -ClassName Win32_Process -MethodName Create -Arguments @{

            CommandLine = $Command

            CurrentDirectory = $WorkDir

        }

        

        # Await lock initialization signature

        $Wait = 0

        while (-not (Test-Path $LockFile) -and $Wait -lt 14) { Start-Sleep -Milliseconds 500; $Wait++ }

        (Get-Content $LockFile -Raw).Trim()

    }

  register: win_worker_pid_capture

  when: is_windows | bool

  tags: engine


- name: "[LINUX] Bootstrap Persistent Background Foothold Engine"

  copy:

    src: worker.sh

    dest: /tmp/.range_engine/worker.sh

    mode: '0700'

  when: not (is_windows | bool)

  tags: engine


- name: "[LINUX] Start Hidden Persistent Worker Shell Instantiation"

  shell: |

    if ! pgrep -f "worker.sh" > /dev/null; then

        nohup /tmp/.range_engine/worker.sh >/dev/null 2>&1 &

        sleep 1

    fi

    pgrep -f "worker.sh" | head -n 1

  register: linux_worker_pid_capture

  when: not (is_windows | bool)

  tags: engine


- name: Set Unified Parent Foothold PID Fact

  set_fact:

    foothold_parent_pid: "{{ win_worker_pid_capture.stdout | trim if is_windows | bool else linux_worker_pid_capture.stdout | trim }}"

  tags: engine


# ------------------------------------------------------------------------

# TECHNIQUE PIPELINE EXECUTION INTERFACES (Synchronous Execution Handshake)

# ------------------------------------------------------------------------

- name: "[WINDOWS] Route Attack Payload & Await Execution Response"

  win_shell: |

    $WorkDir = "C:\ProgramData\RangeEngine"

    $QueueFile = "$WorkDir\incoming.ps1"

    $ResultFile = "$WorkDir\result.txt"


    if (Test-Path $ResultFile) { Remove-Item $ResultFile -Force }


    $Payload = @'

    echo "[SIM] {{ selected_action.name }} ({{ selected_action.technique }})"

    echo "Phase={{ selected_action.phase }}"

    hostname

    '@

    $Payload | Out-File -FilePath $QueueFile -Encoding ascii


    $Timeout = 30

    $Counter = 0

    while (-not (Test-Path $ResultFile) -and $Counter -lt ($Timeout * 2)) {

        Start-Sleep -Milliseconds 500

        $Counter++

    }


    if (Test-Path $ResultFile) {

        Get-Content $ResultFile -Raw

    } else {

        throw "Background worker orchestration tracking timeout occurred on target endpoint."

    }

  register: win_output

  when: is_windows | bool

  tags: engine


- name: "[LINUX] Route Attack Payload & Await Execution Response"

  shell: |

    WORK_DIR="/tmp/.range_engine"

    QUEUE_FILE="$WORK_DIR/incoming.sh"

    RESULT_FILE="$WORK_DIR/result.txt"


    rm -f "$RESULT_FILE"


    echo "echo '[SIM] {{ selected_action.name }} ({{ selected_action.technique }})'" > "$QUEUE_FILE"

    echo "echo 'Phase={{ selected_action.phase }}'" >> "$QUEUE_FILE"

    echo "hostname" >> "$QUEUE_FILE"


    TIMEOUT=30

    COUNTER=0

    while [ ! -f "$RESULT_FILE" ] && [ $COUNTER -lt $((TIMEOUT * 2)) ]; do

        sleep 0.5

        COUNTER=$((COUNTER + 1))

    done


    if [ -f "$RESULT_FILE" ]; then

        cat "$RESULT_FILE"

    else

        echo "Background worker orchestration tracking timeout occurred on target endpoint." && exit 1

    fi

  register: linux_output

  when: not (is_windows | bool)

  tags: engine


- name: Parse Engine Telemetry Logs

  set_fact:

    command_stdout: "{{ win_output.stdout_lines if is_windows | bool else linux_output.stdout_lines }}"

  tags: engine


# ------------------------------------------------------------------------

# SYSTEM LEDGER MATRIX LOGGING

# ------------------------------------------------------------------------

- name: Write Unified Stateful Process Activity Logs to Ledger

  delegate_to: localhost

  lineinfile:

    path: /tmp/adversary_activity.log

    create: yes

    insertafter: EOF

    line: |

      ========================================================================

      [STATEFUL ATTACK TIMELINE EVENT]

      Host= {{ short_host }} | OS_Platform= {{ ansible_os_family }}

      Phase= {{ selected_action.phase }} | Technique= {{ selected_action.technique }}

      PERSISTENT_FOOTHOLD_PARENT_PID= {{ foothold_parent_pid }}

      Time= {{ ansible_date_time.iso8601 }}

      ------------------------------------------------------------------------

      [SIEM INVESTIGATION HINTS - TARGET TELEMETRY LOOKUPS (ESC / EQL)]

      

      /* 1. Track All Activity Originating From This Persistent Foothold Shell */

      process where host.name == "{{ short_host }}" and process.parent.pid == {{ foothold_parent_pid }}

      

      /* 2. Track File Lifecycle Alterations dropped by this Session */

      file where host.name == "{{ short_host }}" and process.parent.pid == {{ foothold_parent_pid }} and event.action in ("creation", "modification")

      

      /* 3. Track Network Infrastructure Callouts originating from this session */

      network where host.name == "{{ short_host }}" and process.parent.pid == {{ foothold_parent_pid }}

      ========================================================================

  tags: engine
