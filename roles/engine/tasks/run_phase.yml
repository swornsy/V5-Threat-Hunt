---

# ========================================================================

# DIAGNOSTIC RUN - CYBER RANGE ENGINE

# ========================================================================


- name: FORCE DIAGNOSTIC DUMP

  debug:

    msg: 

      - "=== HOST IDENTIFICATION ==="

      - "Current inventory_hostname: {{ inventory_hostname }}"

      - "Master Loop Phase: {{ master_loop_phase | default('UNDEFINED') }}"

      - "=== COMPROMISE MATCHING ==="

      - "Is Host Compromised: {{ (inventory_hostname | split('.') | first | lower | trim) in (hostvars['localhost']['compromised_hosts'] | default([]) | map('split', '.') | map('first') | map('lower') | map('trim') | list) }}"

      - "Localhost Compromised List: {{ hostvars['localhost']['compromised_hosts'] | default('NOT FOUND') }}"

      - "=== SOURCE DATA ==="

      - "Attack Sequence Count: {{ attack_sequence | default([]) | length }}"

      - "Global Techniques Baseline: {{ global_techniques | default([]) }}"

  tags: engine


- name: Normalize phase formatting strings

  set_fact:

    normalized_phase: "{{ master_loop_phase | string | trim | lower | replace('_', '-') }}"

    phase_fact_safe: "{{ master_loop_phase | string | trim | lower | replace('-', '_') }}"

  tags: engine


- name: Evaluate Host Foothold Compromise Status

  set_fact:

    is_compromised: "{{ (inventory_hostname | split('.') | first | lower | trim) in (hostvars['localhost']['compromised_hosts'] | default([]) | map('split', '.') | map('first') | map('lower') | map('trim') | list) }}"

  tags: engine


# ------------------------------------------------------------------------

# STEP 3: NATIVE TARGET EXTRACTION

# ------------------------------------------------------------------------

- name: Extract Raw Threat Actor Techniques matching current phase string

  set_fact:

    raw_extracted_techniques: "{{ attack_sequence | default([]) | selectattr('phase', 'equalto', normalized_phase) | list }}"

  tags: engine


- name: Fallback to Global Baseline Pool if Actor Phase is Empty

  set_fact:

    raw_extracted_techniques: "{{ global_techniques | default([]) }}"

  when: raw_extracted_techniques | length == 0

  tags: engine


# ------------------------------------------------------------------------

# STEP 4: BULLETPROOF OBJECT CONVERSION

# ------------------------------------------------------------------------

- name: Structurally Standardize All Sourced Elements into Rich Profiles

  set_fact:

    normalized_phase_objects: >-

      {% set parsed = [] %}

      {% for item in raw_extracted_techniques %}

        {% if item is mapping and item.technique is defined %}

          {% set _ = parsed.append(item) %}

        {% else %}

          {% set technique_id = item.technique | default(item.id) | default(item) | string | trim %}

          {% if technique_id | length > 0 %}

            {% set _ = parsed.append({'technique': technique_id, 'name': 'Cyber Range Standard Profile', 'phase': normalized_phase, 'command': 'echo Running Blueprint ' + technique_id}) %}

          {% endif %}

        {% endif %}

      {% endfor %}

      {{ parsed }}

  tags: engine


- name: Calculate Phase Execution Eligibility

  set_fact:

    should_run_phase: "{{ is_compromised | bool and (normalized_phase_objects | from_yaml | length > 0) and not (hostvars[inventory_hostname]['phase_done_' + phase_fact_safe] | default(false)) }}"

  tags: engine


# ------------------------------------------------------------------------

# STEP 5: FIXED ATTACK LAYOUT SELECTION

# ------------------------------------------------------------------------

- name: Establish Dynamic Baseline Selection Window Limits

  set_fact:

    selected_count: "{{ 1 if test_single_technique | bool else [1, (normalized_phase_objects | from_yaml | length)] | min }}"

  when: should_run_phase | bool

  tags: engine


- name: Finalize Randomized Strategy Execution Layout

  set_fact:

    local_execution_queue: "{{ (normalized_phase_objects | from_yaml | shuffle)[0:(selected_count | int)] }}"

    "selection_done_{{ phase_fact_safe }}": true

  when: 

    - should_run_phase | bool

    - hostvars[inventory_hostname]['selection_done_' + phase_fact_safe] is not defined

  tags: engine


# ------------------------------------------------------------------------

# STEP 6: EXECUTION LIFT

# ------------------------------------------------------------------------

- name: Execute Cyber Range Techniques

  include_tasks: execute_technique.yml

  vars:

    selected_action: "{{ action_item }}"

  loop: "{{ local_execution_queue | default([]) }}"

  loop_control:

    loop_var: action_item

  when:

    - should_run_phase | bool

    - local_execution_queue | length > 0

  tags: engine


- name: Mark phase as completed

  set_fact:

    "phase_done_{{ phase_fact_safe }}": true

  when: is_compromised | bool

  tags: engine
