---
- name: V5 Threat Hunt Adversary Emulation Sequencer
  hosts: localhost
  gather_facts: no

  vars:
    selected_actor_id: "G0016"
    attack_sequence: []

  pre_tasks:
    - name: Load attack matrix
      include_vars:
        file: attack_matrix.yml

    - name: Build attack sequence
      include_tasks: build_attack_sequence.yml

    - name: Show selected actor and attack plan
      debug:
        msg:
          - "Selected actor: {{ selected_actor_id }}"
          - "Planned steps: {{ attack_sequence | length }}"

  tasks:
    - name: Process simulation chain
      include_tasks: run_atomic_step.yml
      loop: "{{ attack_sequence }}"
      loop_control:
        loop_var: attack_step
