---

# ========================================================================

# PRE-EXECUTION SCOPING: SAFE PRIMITIVE LOOKUP & DEFENSIVE GUARDS

# ========================================================================

- name: Resolve Atomic Primitive Key from Mapping Context

  ansible.builtin.set_fact:

    primitive_key: >-

      {{

        (

          mitre_mappings.mapping[current_step.technique.strip()].primitive

          if (

            mitre_mappings is defined and 

            mitre_mappings.mapping is defined and 

            current_step.technique.strip() in mitre_mappings.mapping

          )

          else

          mitre_mappings.mapping[current_step.technique.strip().split('.')].primitive

          if (

            mitre_mappings is defined and 

            mitre_mappings.mapping is defined and 

            current_step.technique.strip().split('.') in mitre_mappings.mapping

          )

          else none

        )

      }}

  tags: always


- name: Verify and Audit Primitive Mapping Resolution

  ansible.builtin.debug:

    msg:

      - "Technique Context:   {{ current_step.technique }}"

      - "Resolved Primitive:  {{ primitive_key | default('NOT FOUND', true) }}"

      - "Loaded Variants:     {{ atomic_primitives.primitives[primitive_key].variants | length if (atomic_primitives is defined and primitive_key is not none and primitive_key in atomic_primitives.primitives) else 0 }}"

  tags: always


- name: Fail if Primitive Mapping is Missing (Calibration Safeguard)

  ansible.builtin.fail:

    msg: >-

      FATAL LOOKUP ERROR: Technique [{{ current_step.technique }}] could not be translated to an atomic primitive. 

      Verify that 'mitre_mappings.mapping' contains this key or its base technique.

  when: >

    primitive_key is none or 

    primitive_key | string | length == 0

  tags: always


# ========================================================================

# DEBUGGER: TELEMETRY AUDIT FOR RANGE CONDITIONALS

# ========================================================================

- name: "DEBUGGER: Audit Range Logic for {{ current_step.technique }}"

  ansible.builtin.debug:

    msg:

      - "Target Host:          {{ inventory_hostname }}"

      - "Technique running:     {{ current_step.technique }}"

      - "Resolved Primitive:    {{ primitive_key }}"

      - "Current Step Stealth:  {{ current_step.stealth | lower }}"

      - "Global OpSec Target:   {{ attack_behaviour | lower }}"

      - "Test Single Tech Flag: {{ test_single_technique }} (Target ID: {{ test_technique_id | default('None') }})"

      - "Test Single Phase Flag:{{ test_single_phase }} (Target Phase: {{ test_phase_name | default('None') }})"

  tags: always


# ========================================================================

# PRE-STAGE OPERATIONS

# ========================================================================

- name: Ensure Target Spooling Queue Folder Architecture Exists

  ansible.windows.win_file:

    path: C:\ProgramData\RangeEngine\Queue

    state: directory

  tags: always


# ========================================================================

# TASK 1: STAGE/COMPILE THE ADVERSARIAL ARTIFACT

# ========================================================================

- name: Stage Compiled Adversarial Script to Local Worker Queue

  ansible.windows.win_copy:

    dest: "C:\\ProgramData\\RangeEngine\\Queue\\{{ current_step.technique }}_{{ variant_item.name }}.ps1"

    content: |

      # ========================================================================

      # ATOMIC PRIMITIVE ARTIFACT (Target Execution Context)

      # Generated: {{ ansible_date_time.iso8601 }}

      # MITRE ATT&CK: {{ current_step.technique }} - {{ current_step.name | default('Unnamed') }}

      # ========================================================================


      # Load localized environment memory layers

      if (Test-Path "C:\ProgramData\RangeEngine\state.ps1") { . "C:\ProgramData\RangeEngine\state.ps1" }


      # Re-hydrate structural session boundaries injected by Ansible Orchestration

      [string[]]$TARGETS = @(

      {% for target in target_ips %}

      "{{ target }}"{% if not loop.last %},{% endif %}

      {% endfor %}

      )


      $USER = "{{ ansible_user }}"

      $PASS = '{{ ansible_password | replace("'", "''") }}'


      # Execute variant code block primitive

      {{ variant_item.script | indent(6, first=false) }}

    force: yes

  vars:

    target_ips: "{{ groups['windows'] | default([inventory_hostname]) | map('extract', hostvars, ['ansible_host']) | list }}"

  loop: "{{ atomic_primitives.primitives[primitive_key].variants | default([]) }}"

  loop_control:

    loop_var: variant_item

    label: "Staging -> {{ current_step.technique }} | Variant: {{ variant_item.name }}"

  when:

    - primitive_key is not none

    - primitive_key | string | length > 0

    - (attack_behaviour == 'mixed') or (current_step.stealth | lower == attack_behaviour | lower)

    - (not test_single_technique) or (current_step.technique | lower == test_technique_id | lower)

    - (not test_single_phase) or (current_step.phase | lower == test_phase_name | lower)

    - variant_item.name | lower != 'poison_pill'

  tags: always


# ========================================================================

# TASK 2: EXECUTION LAYER & POISON PILL SANITIZATION

# ========================================================================

- name: Execute Variant Worker Layer or Fire Poison Pill Sanctuary

  ansible.windows.win_powershell:

    script: |

      $ErrorActionPreference = "Stop"

      $EngineRoot = "C:\ProgramData\RangeEngine"

      $QueueFolder = "$EngineRoot\Queue"


      # --------------------------------------------------------------------

      # CONDITION: HANDLE POISON PILL (CLEANUP TRIGGER)

      # --------------------------------------------------------------------

      if ("{{ variant_item.name | lower }}" -eq "poison_pill") {

          Write-Output "[Execution Engine] Poison Pill detected! Sanitizing queue folder..."

          if (Test-Path $QueueFolder) {

              Remove-Item -Path "$QueueFolder\*" -Include "*.ps1" -Force -ErrorAction SilentlyContinue

          }

          $Ansible.Changed = $true

          Exit 0

      }


      # --------------------------------------------------------------------

      # RUN STAGED TECHNIQUE ARTIFACT

      # --------------------------------------------------------------------

      $ScriptPath = "$QueueFolder\{{ current_step.technique }}_{{ variant_item.name }}.ps1"

      

      if (Test-Path $ScriptPath) {

          Write-Output "[Execution Engine] Spooling Task (Technique: {{ current_step.technique }} | Variant: {{ variant_item.name }})"

          & $ScriptPath

          $Ansible.Changed = $true

      } else {

          Write-Error "[Execution Engine] Expected staged primitive file was missing: $ScriptPath"

      }

  vars:

    target_ips: "{{ groups['windows'] | default([inventory_hostname]) | map('extract', hostvars, ['ansible_host']) | list }}"

  loop: "{{ atomic_primitives.primitives[primitive_key].variants | default([]) }}"

  loop_control:

    loop_var: variant_item

    label: "Running -> {{ current_step.technique }} | Variant: {{ variant_item.name }}"

  register: variant_execution_results

  when:

    - primitive_key is not none

    - primitive_key | string | length > 0

    - (attack_behaviour == 'mixed') or (current_step.stealth | lower == attack_behaviour | lower)

    - (not test_single_technique) or (current_step.technique | lower == test_technique_id | lower)

    - (not test_single_phase) or (current_step.phase | lower == test_phase_name | lower)

  ignore_errors: yes

  tags: always
