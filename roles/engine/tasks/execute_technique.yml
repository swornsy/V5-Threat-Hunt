---

# ========================================================================

# CYBER RANGE ENGINE - ACTION EXECUTION (roles/engine/tasks/execute_technique.yml)

# ========================================================================


- name: Validate selected action matrix structure

  assert:

    that:

      - selected_action is mapping

      - selected_action.technique is defined

      - selected_action.phase is defined

  tags: engine


- name: DEBUG Active Execution Metadata

  debug:

    msg: >-

      Executing {{ selected_action.name }}

      ({{ selected_action.technique }})

      Phase={{ selected_action.phase }}

      Host={{ inventory_hostname }}

  tags: engine


- name: Simulate Technique Shell Execution Block

  win_shell: |

    echo "[SIM] {{ selected_action.name }} ({{ selected_action.technique }})"

    echo "Phase={{ selected_action.phase }}"

    hostname

  register: execution_result

  tags: engine


- name: DEBUG Command Output Contexts

  debug:

    var: execution_result.stdout_lines

  tags: engine


# ------------------------------------------------------------------------

# PIVOT TRIGGER: Safely add next pool target to compromised list

# ------------------------------------------------------------------------

- name: Evaluate and Expand Foothold to Next Downstream Target

  set_fact:

    compromised_hosts: "{{ hostvars['localhost']['compromised_hosts'] + [ hostvars['localhost']['allowed_downstream_targets'][hostvars['localhost']['compromised_hosts'] | length - 1] ] }}"

  delegate_to: localhost

  delegate_facts: true

  when:

    - normalized_phase in ['lateral-movement', 'lateral_movement']

    - execution_result.rc | default(0) == 0

    - (hostvars['localhost']['compromised_hosts'] | length - 1) < (hostvars['localhost']['allowed_downstream_targets'] | length)

  tags: engine


# ------------------------------------------------------------------------

# Track Completed Techniques in Memory

# ------------------------------------------------------------------------

- name: Track technique execution history to block replication

  set_fact:

    used_techniques: "{{ (used_techniques | default([])) + [ selected_action.technique ] }}"

  tags: engine


# ------------------------------------------------------------------------

# CENTRAL LOGGING (CONTROL NODE)

# ------------------------------------------------------------------------

- name: Write technique execution tracks to central range history logs

  delegate_to: localhost

  run_once: false

  lineinfile:

    path: /tmp/adversary_activity.log

    create: yes

    insertafter: EOF

    line: >-

      [SIM]

      Host={{ inventory_hostname }}

      Phase={{ selected_action.phase }}

      Technique={{ selected_action.technique }}

      Output={{ execution_result.stdout_lines | default([]) | join(' | ') }}

      Time={{ ansible_date_time.iso8601 }}

  when: execution_result is defined

  tags: engine


# ------------------------------------------------------------------------

# ✅ FIXED PACING DELAY: Force progressive serialization delays

# ------------------------------------------------------------------------

- name: Simulate realistic staggered dwell time pacing between attacks

  delegate_to: localhost

  pause:

    seconds: "{{ ((ansible_play_hosts.index(inventory_hostname) + 1) * 3) + (range(2, 6) | random) }}"

  tags: engine
