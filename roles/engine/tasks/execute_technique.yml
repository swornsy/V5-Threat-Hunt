---


# ========================================================================

# PRE-EXECUTION: SANITIZE AND RESOLVE TECHNIQUE → PRIMITIVE → COMMAND

# ========================================================================


- name: Sanitize and Clean Technique ID Layout Strings

  set_fact:

    clean_technique: "{{ item.technique | string | trim }}"


- name: Safely Extract Base Technique ID

  set_fact:

    base_technique: "{{ clean_technique.split('.') }}"


- name: Resolve Mapping Entry (Full then Base Technique)

  set_fact:

    mapping_entry: "{{ mitre_mappings.mapping.get(clean_technique) or mitre_mappings.mapping.get(base_technique) or {} }}"


- name: Apply Fallback Mapping if Missing

  set_fact:

    mapping_entry: "{{ mapping_entry if (mapping_entry | length > 0) else (mitre_mappings.fallback.get(item.phase | lower) or mitre_mappings.fallback.default) }}"


- name: Extract Primitive + Command + Outcome

  set_fact:

    primitive_key: "{{ mapping_entry.primitive }}"

    mapped_command: "{{ mapping_entry.command }}"

    mapping_outcome: "{{ mapping_entry.outcome | default('none') }}"


# ========================================================================

# DEBUG VISIBILITY

# ========================================================================


- name: DEBUG Mapping Resolution

  debug:

    msg:

      - "Technique: {{ clean_technique }}"

      - "Base Technique: {{ base_technique }}"

      - "Phase: {{ item.phase }}"

      - "Primitive: {{ primitive_key }}"

      - "Command: {{ mapped_command }}"

      - "Outcome: {{ mapping_outcome }}"

      - "Variants Available: {{ atomic_primitives.primitives[primitive_key].variants | length if (primitive_key in atomic_primitives.primitives) else 0 }}"


# ========================================================================

# SAFETY GUARD

# ========================================================================


- name: Fail if Primitive Missing Completely

  fail:

    msg: "Technique {{ clean_technique }} could not be mapped to a primitive."

  when: primitive_key is not defined or primitive_key | length == 0


# ========================================================================

# PRE-STAGE DIRECTORY

# ========================================================================


- name: Ensure Queue Directory Exists

  ansible.windows.win_file:

    path: C:\ProgramData\RangeEngine\Queue

    state: directory


# ========================================================================

# STAGE EXECUTION ARTIFACTS (STATE + VARIANTS + OUTCOMES)

# ========================================================================


- name: Stage Technique Variants

  ansible.windows.win_copy:

    dest: "C:\\ProgramData\\RangeEngine\\Queue\\{{ clean_technique }}_{{ variant_item.name }}.ps1"

    content: |

      # ========================================================================

      # RANGE ENGINE EXECUTION PAYLOAD

      # MITRE: {{ clean_technique }}

      # Primitive: {{ primitive_key }}

      # Variant: {{ variant_item.name }}

      # ========================================================================


      if (Test-Path "C:\ProgramData\RangeEngine\state.ps1") {

        . "C:\ProgramData\RangeEngine\state.ps1"

      }


      try {


        Write-Output "[Execution] Running {{ clean_technique }} ({{ variant_item.name }})"


        # ------------------------------------------------------------

        # EXECUTE VARIANT OR FALLBACK COMMAND

        # ------------------------------------------------------------


        {% if variant_item.script is defined %}

        {{ variant_item.script | indent(8) }}

        {% else %}

        {{ mapped_command }}

        {% endif %}


        # ------------------------------------------------------------

        # STATE ENGINE INTEGRATION

        # ------------------------------------------------------------


        $state = Get-RangeState

        $outcome = "{{ mapping_outcome }}"


        Write-Output "[State Engine] Outcome: $outcome"


        switch ($outcome) {


            "discovered_hosts" {


                Write-Output "[State Engine] Adding discovered hosts"


                foreach ($entry in @("fs01","dc01","ca01","wef01")) {

                    if ($entry -notin $state.discovered_hosts) {

                        Add-DiscoveredHost $entry

                    }

                }

            }


            "credentials" {


                Write-Output "[State Engine] Adding credential artifact"


                Add-Credential "admin" "{{ clean_technique }}"

            }


            "lateral_movement" {


                # =====================================================

                # RANDOM + BOUNDED + ATTRIBUTED LATERAL MOVEMENT

                # =====================================================


                $maxSpread = {{ max_compromise_count | default(3) }}

                $currentOwned = @($state.owned_hosts).Count


                Write-Output "[State Engine] Current owned hosts: $currentOwned / $maxSpread"


                if ($currentOwned -ge $maxSpread) {


                    Write-Output "[State Engine] Spread limit reached - stopping lateral movement"


                } else {


                    $candidates = @($state.discovered_hosts | Where-Object { $_ -notin $state.owned_hosts })


                    if ($candidates.Count -eq 0) {


                        Write-Output "[State Engine] No valid candidates for lateral movement"


                    } else {


                        $chance = Get-Random -Minimum 1 -Maximum 100


                        Write-Output "[State Engine] Lateral attempt roll: $chance"


                        if ($chance -le 50) {


                            $target = Get-Random -InputObject $candidates


                            Write-Output "[State Engine] SUCCESS - New host compromised: $target"


                            Add-OwnedHost $target


                            # Track source → target pathing

                            Add-LateralLink $env:COMPUTERNAME $target


                        } else {


                            Write-Output "[State Engine] FAILED - Lateral movement attempt unsuccessful"

                        }

                    }

                }

            }


            default {

                # No state change

            }

        }


      } catch {

        Write-Output "[Execution Error]"

        $_

      }


  loop: "{{ atomic_primitives.primitives[primitive_key].variants | default([{'name': 'default', 'script': mapped_command}]) }}"

  loop_control:

    loop_var: variant_item

  when:

    - (attack_behaviour == 'mixed') or (item.stealth | lower == attack_behaviour | lower)

    - (not test_single_technique) or (clean_technique | lower == test_technique_id | lower)

    - (not test_single_phase) or (item.phase | lower == test_phase_name | lower)


# ========================================================================

# EXECUTION LAYER

# ========================================================================


- name: Execute Technique Variants

  ansible.windows.win_powershell:

    script: |

      $ErrorActionPreference = "Stop"


      $Queue = "C:\ProgramData\RangeEngine\Queue"

      $Script = "$Queue\{{ clean_technique }}_{{ variant_item.name }}.ps1"


      if (Test-Path $Script) {

          Write-Output "[Execution Engine] Running {{ clean_technique }} ({{ variant_item.name }})"

          & $Script

      } else {

          Write-Error "Missing script: $Script"

      }


  loop: "{{ atomic_primitives.primitives[primitive_key].variants | default([{'name': 'default'}]) }}"

  loop_control:

    loop_var: variant_item

  when:

    - (attack_behaviour == 'mixed') or (item.stealth | lower == attack_behaviour | lower)

    - (not test_single_technique) or (clean_technique | lower == test_technique_id | lower)

    - (not test_single_phase) or (item.phase | lower == test_phase_name | lower)

  ignore_errors: yes

  register: execution_results


# ========================================================================

# SYNC STATE BACK TO ANSIBLE (MULTI-HOST CAMPAIGN)

# ========================================================================


- name: Pull state.json from host

  ansible.windows.win_shell: |

    if (Test-Path "C:\ProgramData\RangeEngine\state.json") {

      Get-Content "C:\ProgramData\RangeEngine\state.json" -Raw

    }

  register: state_data


- name: Extract owned hosts

  set_fact:

    new_owned_hosts: "{{ (state_data.stdout | from_json).owned_hosts | default([]) }}"

  when: state_data.stdout is defined and state_data.stdout | length > 0


- name: Merge into global compromised_hosts

  set_fact:

    compromised_hosts: "{{ (compromised_hosts | default([]) + new_owned_hosts) | unique }}"

  delegate_to: localhost

  run_once: true


# ========================================================================

# OPTIONAL CLEANUP (POISON PILL SAFE)

# ========================================================================


- name: Handle Poison Pill Cleanup

  ansible.windows.win_powershell:

    script: |

      $Queue = "C:\ProgramData\RangeEngine\Queue"


      Write-Output "[Cleanup] Clearing execution queue"


      if (Test-Path $Queue) {

          Remove-Item "$Queue\*" -Force -Recurse -ErrorAction SilentlyContinue

      }

  when: item.name is defined and item.name | lower is search("poison")
