---
# ========================================================================
# CYBER RANGE SIMULATION ENGINE - PER-HOST LIFECYCLE (run_phase.yml)
# ========================================================================

- name: Assess Infection Perimeter Control Mapping
  ansible.builtin.set_fact:
    is_compromised: "{{ inventory_hostname in (hostvars['localhost']['compromised_hosts'] | default([]) | list) }}"

# ------------------------------------------------------------------------
# TECHNIQUE EXECUTION (Host executes actions matching its local state)
# ------------------------------------------------------------------------
- name: Process and Execute Targeted Cyber Range Vectors
  include_tasks: execute_technique.yml
  vars:
    selected_action: "{{ item }}"
  # Filters the global actor sequence to only run actions matching the current phase loop
  loop: "{{ attack_sequence | default([]) | selectattr('phase', 'equalto', master_loop_phase) | list }}"
  when: 
    - is_compromised | bool
    - item.technique not in (used_techniques | default([]))

# ------------------------------------------------------------------------
# DYNAMIC BOUNDED LATERAL MOVEMENT: Pivot to 1-2 random uncompromised hosts
# ------------------------------------------------------------------------
- name: Register Pivoted Assets into Global Infection Tracking Group
  ansible.builtin.set_fact:
    compromised_hosts: >-
      {{ 
        (hostvars['localhost']['compromised_hosts'] | default([]) | list) + 
        (groups['windows'] | difference(hostvars['localhost']['compromised_hosts'] | default([]) | list) | shuffle)[:2] | list
      }}
  delegate_to: localhost
  delegate_facts: true
  run_once: true
  vars:
    # Verifies if the threat actor actually has actionable items for this specific phase
    has_lateral_item: "{{ attack_sequence | default([]) | selectattr('phase', 'equalto', master_loop_phase) | list | length > 0 }}"
  when:
    - master_loop_phase == 'lateral_movement'
    - is_compromised | bool
    - has_lateral_item | bool

# ------------------------------------------------------------------------
# LOCAL TRACKING: Mark all run techniques as spent for this specific host
# ------------------------------------------------------------------------
- name: Update Host Local Blacklist Cache Arrays
  ansible.builtin.set_fact:
    used_techniques: "{{ used_techniques | default([]) + (attack_sequence | default([]) | selectattr('phase', 'equalto', master_loop_phase) | map(attribute='technique') | list) }}"
  when: is_compromised | bool
