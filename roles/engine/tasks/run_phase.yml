# ----------------------------

# DELAYAL)# DELAY

# ----------------------------


- set_fact:

    selected_action: "{{ step }}"

  when: attack_mode == "temporal"


# ----------------------------

# ACTION (SCORING)

# ----------------------------


- block:


    - set_fact:

        candidates: "{{ actor_data[current_phase] | default([]) }}"


    - set_fact:

        candidates: "{{ candidates | rejectattr('technique','in',used_techniques) | list }}"


    - set_fact:

        candidates: "{{ candidates if candidates else actor_data[current_phase] }}"


    - set_fact:

        selected_action: "{{ (candidates | sort(attribute='score.stealth'))[0] }}"

      when: candidates | length > 0


  when: attack_mode != "temporal"


# ----------------------------

# TRACK TECHNIQUES

# ----------------------------


- set_fact:

    used_techniques: "{{ used_techniques + [selected_action.technique] }}"


# ----------------------------

# MULTI-HOST MODEL ✅

# ----------------------------


- set_fact:

    primary_host: "{{ compromised_hosts | random }}"


- set_fact:

    secondary_host: "{{ (groups['windows'] | difference(compromised_hosts)) | random }}"

  when:

    - current_phase == "lateral_movement"

    - (groups['windows'] | difference(compromised_hosts)) | length > 0


- set_fact:

    compromised_hosts: "{{ compromised_hosts + [secondary_host] }}"

  when: secondary_host is defined


# ----------------------------

# OUTPUT

# ----------------------------


- debug:

    msg: >

      EXECUTE {{ selected_action.name }}

      ({{ selected_action.technique }})

      → {{ primary_host }}

      | phase={{ current_phase }}


- debug:

    msg: >

      HUNT: {{ selected_action.hunt.description | default('generic') }}


- debug:

    msg: >

      KQL: {{ selected_action.hunt.kql | default('N/A') }}


# ----------------------------

# JSON LOG ✅

# ----------------------------


- name: Append attack log

  lineinfile:

    path: "/tmp/attack_log.json"

    create: yes

    line: >

      {{ {

        "time": ansible_date_time.iso8601,

        "host": primary_host,

        "phase": current_phase,

        "technique": selected_action.technique,

        "name": selected_action.name

      } | to_json }}


# ----------------------------


- name: Apply dwell delay

  pause:

    seconds: "{{ step.delay | default(1) }}"

  when:

    - attack_mode == "temporal"

    - step.delay is defined


# ----------------------------

# STATE

# ----------------------------


- set_fact:

    current_phase: "{{ step.phase }}"

    compromised_hosts: "{{ compromised_hosts | default(groups['windows'] | default(['wks01'])) }}"

    used_techniques: "{{ used_techniques | default([]) }}"


# ----------------------------

