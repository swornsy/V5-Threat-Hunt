---

- name: Validate selected action

  assert:

    that:

      - selected_action is mapping

      - selected_action.technique is defined

      - selected_action.phase is defined

  when: is_compromised | bool

  tags: engine


- name: DEBUG execution

  debug:

    msg: >

      Executing {{ selected_action.name }}

      ({{ selected_action.technique }})

      Phase={{ selected_action.phase }}

      Host={{ inventory_hostname }}

  when: is_compromised | bool

  tags: engine


- name: Simulate execution

  win_shell: |

    echo "[SIM] {{ selected_action.name }} ({{ selected_action.technique }})"

    echo "Phase={{ selected_action.phase }}"

    hostname

  register: execution_result

  when: is_compromised | bool

  tags: engine


- name: DEBUG result

  debug:

    var: execution_result.stdout_lines

  when: 

    - is_compromised | bool

    - execution_result.stdout_lines is defined

  tags: engine


- name: Write attack log to local control box

  delegate_to: localhost

  run_once: false

  lineinfile:

    path: /tmp/adversary_report.txt

    line: "{{ selected_actor_id | default('G0016') }} | {{ inventory_hostname }} | {{ ansible_date_time.iso8601 }} | {{ selected_action.phase }} | {{ selected_action.name }} | {{ selected_action.technique }}"

    create: yes

  when: is_compromised | bool

  tags: engine


- name: Track technique

  set_fact:

    used_techniques: "{{ (used_techniques | default([])) + [ selected_action.technique ] }}"

  when: is_compromised | bool

  tags: engine
