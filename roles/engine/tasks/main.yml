---

# ========================================================================

# V5 THREAT HUNT ENGINE CORE EXECUTION ENGINE (roles/engine/tasks/main.yml)

# ========================================================================


- name: Import Atomic Simulation Script Definitions

  include_vars:

    file: "vars/primitives.yml"

    name: atomic_primitives

  tags: always


- name: Import MITRE ATT&CK Technique Mapping Rules

  include_vars:

    file: "vars/mitre_mapping.yml"

    name: mitre_mappings

  tags: always


# --------------------------------------------------------------------

# STAGE ENVIRONMENT: Deploy local state engine tracking mechanics

# --------------------------------------------------------------------

- name: Ensure RangeEngine Root Directory Exists on Target

  ansible.windows.win_file:

    path: C:\ProgramData\RangeEngine

    state: directory

  when: inventory_hostname == hostvars['localhost']['patient_zero_host']


- name: Deploy Local State Machine Core Script (state.ps1)

  ansible.windows.win_copy:

    src: files/state.ps1

    dest: C:\ProgramData\RangeEngine\state.ps1

  when: inventory_hostname == hostvars['localhost']['patient_zero_host']


# --------------------------------------------------------------------

# EXECUTION LOOP

# --------------------------------------------------------------------

- name: Process Campaign Adversary Execution Sequence Loop

  include_tasks: execute_technique.yml

  vars:

    target_ips: "{{ hostvars['localhost']['allowed_downstream_targets'] | map('extract', hostvars, ['ansible_host']) | list }}"

  loop: "{{ attack_sequence }}"

  loop_control:

    loop_var: current_step

  when: inventory_hostname == hostvars['localhost']['patient_zero_host']

  tags: always
