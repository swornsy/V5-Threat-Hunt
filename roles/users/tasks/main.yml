---
# roles/users/tasks/main.yml

# ------------------------------------------------------------------------
# USER PROFILE INTERACTION NOISE (ENCODING-HARDENED)
# ------------------------------------------------------------------------
- name: Kick off asynchronous background user activity simulation
  ansible.windows.win_shell: |
    $ScriptBlock = {
        $ErrorActionPreference = 'SilentlyContinue'
        [Console]::OutputEncoding = [System.Text.Encoding]::ASCII
        for ($i = 0; $i -lt 10; $i++) {
            $EnvPaths = $env:PATH -split ';'
            Get-ItemProperty -Path "HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\User Shell Folders" | Out-String
            $TargetDir = [System.IO.Path]::Combine($env:USERPROFILE, "Downloads")
            If (Test-Path $TargetDir) { Get-ChildItem -Path $TargetDir -Recurse -Depth 1 | Select-Object -First 5 | Out-String }
            Get-ItemProperty -Path "HKCU:\Control Panel\Desktop" -Name "Wallpaper" | Out-String
            Start-Sleep -Seconds (Get-Random -Min 2 -Max 5)
        }
    }
    Start-Job -ScriptBlock $ScriptBlock
  async: 60                 
  poll: 0                  
  changed_when: false
