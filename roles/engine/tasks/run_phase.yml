---

# ================================================================

# CYBER RANGE ENGINE - RUN PHASE HANDLER

# ================================================================


- name: Normalize phase

  set_fact:

    normalized_phase: "{{ master_loop_phase | string | trim | lower }}"

  tags: engine



- name: DEBUG normalized phase

  debug:

    msg: "Phase={{ normalized_phase }} ({{ normalized_phase | type_debug }})"

  tags: engine



# ---------------------------------------------------------------

# Evaluate if host is compromised (foothold logic)

# ---------------------------------------------------------------


- name: Evaluate Host Foothold Compromise Status

  set_fact:

    is_compromised: "{{ inventory_hostname in (hostvars['localhost']['compromised_hosts'] | default([])) or (inventory_hostname | split('.') | first) in (hostvars['localhost']['compromised_hosts'] | default([])) }}"

  tags: engine



# ---------------------------------------------------------------

# Build technique list for this phase (FIXED VERSION)

# ---------------------------------------------------------------


- name: Build phase-specific technique list

  set_fact:

    phase_techniques: "{{ (attack_sequence | selectattr('phase', 'equalto', normalized_phase) | list) | default([]) }}"

  tags: engine



# ---------------------------------------------------------------

# Debug phase execution

# ---------------------------------------------------------------


- name: DEBUG phase execution

  debug:

    msg: >-

      Phase={{ normalized_phase }}

      Host={{ inventory_hostname }}

      Is Compromised={{ is_compromised | bool }}

      Technique Count={{ phase_techniques | length }}

  tags: engine



# ---------------------------------------------------------------

# Execute techniques for this phase

# ---------------------------------------------------------------


- name: Execute Cyber Range Techniques

  include_tasks: execute_technique.yml

  vars:

    selected_action: "{{ technique }}"

    current_phase: "{{ normalized_phase }}"

  loop: "{{ phase_techniques }}"

  loop_control:

    loop_var: technique

  when:

    - phase_techniques is defined

    - phase_techniques | length > 0

    - is_compromised | bool

  tags: engine
