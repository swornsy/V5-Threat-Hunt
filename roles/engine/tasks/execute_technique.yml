---

# ========================================================================

# MULTI-OS STATEFUL PROCESS ENGINE - DECOUPLED PROCESS LINEAGE (execute_technique.yml)

# ========================================================================


- name: Establish Cross-Platform Host Environment Variables

  set_fact:

    is_windows: "{{ ansible_os_family == 'Windows' }}"

    short_host: "{{ inventory_hostname | split('.') | first }}"

  tags: engine


# ------------------------------------------------------------------------

# DETACHED FORENSIC WORKER ASSURANCE LOOP

# ------------------------------------------------------------------------

- name: "[WINDOWS] Enforce RangeEngine Target Runtime Directory"

  win_file:

    path: C:\ProgramData\RangeEngine

    state: directory

  when: is_windows | bool

  tags: engine


- name: "[WINDOWS] Bootstrap Persistent Background Foothold Engine"

  win_copy:

    src: worker.ps1

    dest: C:\ProgramData\RangeEngine\worker.ps1

  when: is_windows | bool

  tags: engine


- name: "[WINDOWS] Start Hidden Detached User-Space Worker via WMI Engine"

  win_shell: |

    $WorkDir = "C:\ProgramData\RangeEngine"

    $Path = "$WorkDir\\worker.ps1"

    $LockFile = "$WorkDir\\worker.lock"

    

    $NeedsStart = $true

    if (Test-Path $LockFile) {

        $SavedPID = (Get-Content $LockFile -Raw).Trim()

        $Proc = Get-Process -Id $SavedPID -ErrorAction SilentlyContinue

        if ($Proc -and $Proc.ProcessName -eq "powershell") {

            $NeedsStart = $false

        }

    }

    

    if ($NeedsStart) {

        Remove-Item $LockFile -Force -ErrorAction SilentlyContinue

        # Spawn completely detached from WinRM parent process session constraints

        Invoke-CimMethod -ClassName Win32_Process -MethodName Create -Arguments @{

            CommandLine = "powershell.exe -WindowStyle Hidden -ExecutionPolicy Bypass -File $Path"

        } | Out-Null

        Start-Sleep -Seconds 2

    }

    

    if (Test-Path $LockFile) {

        return (Get-Content $LockFile -Raw).Trim()

    } else {

        throw "Failed to capture operational process foothold PID context"

    }

  register: win_foothold_spawn

  when: is_windows | bool

  tags: engine


- name: "[WINDOWS] Bind Operational Parent PID Contexts"

  set_fact:

    foothold_parent_pid: "{{ win_foothold_spawn.stdout | trim }}"

  when: is_windows | bool

  tags: engine


# ------------------------------------------------------------------------

# DYNAMIC MITRE ATT&CK TARGET PAYLOAD INJECTION

# ------------------------------------------------------------------------

- name: "[WINDOWS] Inject Atomic Technique Actions into Target Worker Queue"

  win_copy:

    content: |

      # Range Engine Atomic Technique Payload Injection Script Block

      # Target Map: {{ selected_action.technique }} - {{ selected_action.name }}

      Start-Process cmd.exe -ArgumentList "/c {{ selected_action.command | default('echo Simulation Activity') }}" -WindowStyle Hidden

    dest: C:\ProgramData\RangeEngine\incoming.ps1

  when: is_windows | bool

  tags: engine


# ------------------------------------------------------------------------

# LEDGER AND SIMULATION METRICS LOGGING LAYER

# ------------------------------------------------------------------------

- name: Write Unified Stateful Process Activity Logs to Ledger

  delegate_to: localhost

  lineinfile:

    path: /tmp/adversary_activity.log

    create: yes

    insertafter: EOF

    line: |

      ========================================================================

      [STATEFUL ATTACK TIMELINE EVENT]

      Host= {{ short_host }} | OS_Platform= {{ ansible_os_family }}

      Phase= {{ selected_action.phase }} | Technique= {{ selected_action.technique }}

      PERSISTENT_FOOTHOLD_PARENT_PID= {{ foothold_parent_pid | default('N/A') }}

      Time= {{ ansible_date_time.iso8601 }}

      ------------------------------------------------------------------------

      [SIEM INVESTIGATION HINTS - TARGET TELEMETRY LOOKUPS (ESC / EQL)]

      

      /* 1. Track All Activity Originating From This Persistent Foothold Shell */

      process where host.name == "{{ short_host }}" and process.parent.pid == {{ foothold_parent_pid | default(0) }}

      

      /* 2. Track File Lifecycle Alterations dropped by this Session */

      file where host.name == "{{ short_host }}" and process.parent.pid == {{ foothold_parent_pid | default(0) }} and event.action in ("creation", "modification")

      

      /* 3. Track Network Infrastructure Callouts originating from this session */

      network where host.name == "{{ short_host }}" and process.parent.pid == {{ foothold_parent_pid | default(0) }}

      ========================================================================

  tags: engine


# ------------------------------------------------------------------------

# ADVANCED STOCHASTIC TIMELINE PACING MATRIX (Cryptographic Jitter Seed)

# ------------------------------------------------------------------------

- name: Apply Operational Stochastic Pacing Jitter Delay

  pause:

    seconds: >-

      {% if sim_duration == 'test' %}

        5

      {% else %}

        {% set base_map = {'30m': 1800, '24h': 86400, '72h': 259200} %}

        {% set total_seconds = base_map[sim_duration] | default(0) %}

        {% set host_seed = (inventory_hostname | hash('md5') | int(base=16)) % 1000 %}

        {% set loop_seed = (ansible_date_time.epoch | int) % 500 %}

        {% set random_factor = (((host_seed + loop_seed) * 31) % 100) / 100.0 %}

        {% set calculated_delay = (total_seconds * random_factor / (ansible_play_batch | length + 1)) | int %}

        {{ calculated_delay if calculated_delay > 5 else 5 }}

      {% endif %}

  tags: engine
