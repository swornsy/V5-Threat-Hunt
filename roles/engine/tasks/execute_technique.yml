- name: Append Forensic JSON Event Objects for SIEM Pipeline Simulation
  ansible.builtin.lineinfile:
    path: /tmp/attack_log.json
    create: yes
    mode: '0644'
    line: >-
      {{ {
        "time": ansible_date_time.iso8601,
        "host": inventory_hostname,
        "phase": selected_action.phase,
        "technique": selected_action.technique,
        "name": selected_action.name,
        "status": "executed"
      } | to_json }}
  delegate_to: localhost
