apt_catalog:
  China:
  - name: admin@338
    id: G0018
    groups: nan
    description: "admin@338\_is a China-based cyber threat group. It has previously\
      \ used newsworthy events as lures to deliver malware and has primarily targeted\
      \ organizations involved in financial, economic, and trade policy, typically\
      \ using publicly available RATs such as\_PoisonIvy, as well as some non-public\
      \ backdoors."
  - name: Aoqin Dragon
    id: G1007
    groups: nan
    description: "Aoqin Dragon\_is a suspected Chinese cyber espionage threat group\
      \ that has been active since at least 2013.\_Aoqin Dragon\_has primarily targeted\
      \ government, education, and telecommunication organizations in Australia, Cambodia,\
      \ Hong Kong, Singapore, and Vietnam. Security researchers noted a potential\
      \ association between\_Aoqin Dragon\_and UNC94, based on malware, infrastructure,\
      \ and targets."
  - name: APT1
    id: G0006
    groups: Comment Crew, Comment Group, Comment Panda
    description: "APT1\_is a Chinese threat group that has been attributed to the\
      \ 2nd Bureau of the People\u2019s Liberation Army (PLA) General Staff Department\u2019\
      s (GSD) 3rd Department, commonly known by its Military Unit Cover Designator\
      \ (MUCD) as Unit 61398."
  - name: APT12
    id: G0005
    groups: IXESHE, DynCalc, Numbered Panda, DNSCALC
    description: "APT12\_is a threat group that has been attributed to China. The\
      \ group has targeted a variety of victims including but not limited to media\
      \ outlets, high-tech companies, and multiple governments."
  - name: APT16
    id: G0023
    groups: nan
    description: "APT16\_is a China-based threat group that has launched spearphishing\
      \ campaigns targeting Japanese and Taiwanese organizations."
  - name: APT17
    id: G0025
    groups: Deputy Dog
    description: "APT17\_is a China-based threat group that has conducted network\
      \ intrusions against U.S. government entities, the defense industry, law firms,\
      \ information technology companies, mining companies, and non-government organizations."
  - name: APT19
    id: G0073
    groups: Codoso, C0d0so0, Codoso Team, Sunshop Group
    description: "APT19\_is a Chinese-based threat group that has targeted a variety\
      \ of industries, including defense, finance, energy, pharmaceutical, telecommunications,\
      \ high tech, education, manufacturing, and legal services. In 2017, a phishing\
      \ campaign was used to target seven law and investment firms. Some analysts\
      \ track\_APT19\_and\_Deep Panda\_as the same group, but it is unclear from open\
      \ source information if the groups are the same."
  - name: APT3
    id: G0022
    groups: Gothic Panda, Pirpi, UPS Team, Buckeye, Threat Group-0110, TG-0110
    description: "APT3\_is a China-based threat group that researchers have attributed\
      \ to China's Ministry of State Security. This group is responsible for the campaigns\
      \ known as Operation Clandestine Fox, Operation Clandestine Wolf, and Operation\
      \ Double Tap. As of June 2015, the group appears to have shifted from targeting\
      \ primarily US victims to primarily political organizations in Hong Kong."
  - name: APT30
    id: G0013
    groups: nan
    description: "APT30\_is a threat group suspected to be associated with the Chinese\
      \ government. While\_Naikon\_shares some characteristics with\_APT30, the two\
      \ groups do not appear to be exact matches."
  - name: APT37
    id: G0067
    groups: InkySquid, ScarCruft, Reaper, Group123, TEMP.Reaper, Ricochet Chollima
    description: "APT37\_is a North Korean state-sponsored cyber espionage group that\
      \ has been active since at least 2012. The group has targeted victims primarily\
      \ in South Korea, but also in Japan, Vietnam, Russia, Nepal, China, India, Romania,\
      \ Kuwait, and other parts of the Middle East.\_APT37\_has also been linked to\
      \ the following campaigns between 2016-2018: Operation Daybreak, Operation Erebus,\
      \ Golden Time, Evil New Year, Are you Happy?, FreeMilk, North Korean Human Rights,\
      \ and Evil New Year 2018."
  - name: APT41
    id: G0096
    groups: Wicked Panda, Brass Typhoon, BARIUM
    description: "APT41\_is a threat group that researchers have assessed as Chinese\
      \ state-sponsored espionage group that also conducts financially-motivated operations.\
      \ Active since at least 2012,\_APT41\_has been observed targeting various industries,\
      \ including but not limited to healthcare, telecom, technology, finance, education,\
      \ retail and video game industries in 14 countries. Notable behaviors include\
      \ using a wide range of malware and tools to complete mission objectives.\_\
      APT41\_overlaps at least partially with public reporting on groups including\
      \ BARIUM and\_Winnti Group."
  - name: APT5
    id: G1023
    groups: Mulberry Typhoon, MANGANESE, BRONZE FLEETWOOD, Keyhole Panda, UNC2630
    description: "APT5\_is a China-based espionage actor that has been active since\
      \ at least 2007 primarily targeting the telecommunications, aerospace, and defense\
      \ industries throughout the U.S., Europe, and Asia.\_APT5\_has displayed advanced\
      \ tradecraft and significant interest in compromising networking devices and\
      \ their underlying software including through the use of zero-day exploits."
  - name: Aquatic Panda
    id: G0143
    groups: nan
    description: "Aquatic Panda\_is a suspected China-based threat group with a dual\
      \ mission of intelligence collection and industrial espionage. Active since\
      \ at least May 2020,\_Aquatic Panda\_has primarily targeted entities in the\
      \ telecommunications, technology, and government sectors."
  - name: Axiom
    id: G0001
    groups: Group 72
    description: "Axiom\_is a suspected Chinese cyber espionage group that has targeted\
      \ the aerospace, defense, government, manufacturing, and media sectors since\
      \ at least 2008. Some reporting suggests a degree of overlap between\_Axiom\_\
      and\_Winnti Group\_but the two groups appear to be distinct based on differences\
      \ in reporting on TTPs and targeting."
  - name: BITTER
    id: G1002
    groups: T-APT-17
    description: "BITTER\_is a suspected South Asian cyber espionage threat group\
      \ that has been active since at least 2013.\_BITTER\_has targeted government,\
      \ energy, and engineering organizations in Pakistan, China, Bangladesh, and\
      \ Saudi Arabia."
  - name: BlackTech
    id: G0098
    groups: Palmerworm
    description: "BlackTech\_is a suspected Chinese cyber espionage group that has\
      \ primarily targeted organizations in East Asia--particularly Taiwan, Japan,\
      \ and Hong Kong--and the US since at least 2013.\_BlackTech\_has used a combination\
      \ of custom malware, dual-use tools, and living off the land tactics to compromise\
      \ media, construction, engineering, electronics, and financial company networks."
  - name: BRONZE BUTLER
    id: G0060
    groups: REDBALDKNIGHT, Tick
    description: "BRONZE BUTLER\_is a cyber espionage group with likely Chinese origins\
      \ that has been active since at least 2008. The group primarily targets Japanese\
      \ organizations, particularly those in government, biotechnology, electronics\
      \ manufacturing, and industrial chemistry."
  - name: Chimera
    id: G0114
    groups: nan
    description: "Chimera\_is a suspected China-based threat group that has been active\
      \ since at least 2018 targeting the semiconductor industry in Taiwan as well\
      \ as data from the airline industry."
  - name: Cinnamon Tempest
    id: G1021
    groups: DEV-0401, Emperor Dragonfly, BRONZE STARLIGHT
    description: "Cinnamon Tempest\_is a China-based threat group that has been active\
      \ since at least 2021 deploying multiple strains of ransomware based on the\
      \ leaked\_Babuk\_source code.\_Cinnamon Tempest\_does not operate their ransomware\
      \ on an affiliate model or purchase access but appears to act independently\
      \ in all stages of the attack lifecycle. Based on victimology, the short lifespan\
      \ of each ransomware variant, and use of malware attributed to government-sponsored\
      \ threat groups,\_Cinnamon Tempest\_may be motivated by intellectual property\
      \ theft or cyberespionage rather than financial gain."
  - name: Daggerfly
    id: G1034
    groups: Evasive Panda, BRONZE HIGHLAND
    description: "Daggerfly\_is a People's Republic of China-linked APT entity active\
      \ since at least 2012.\_Daggerfly\_has targeted individuals, government and\
      \ NGO entities, and telecommunication companies in Asia and Africa.\_Daggerfly\_\
      is associated with exclusive use of\_MgBot\_malware and is noted for several\
      \ potential supply chain infection campaigns."
  - name: Deep Panda
    id: G0009
    groups: Shell Crew, WebMasters, KungFu Kittens, PinkPanther, Black Vine
    description: "Deep Panda\_is a suspected Chinese threat group known to target\
      \ many industries, including government, defense, financial, and telecommunications.\
      \ The intrusion into healthcare company Anthem has been attributed to\_Deep\
      \ Panda. This group is also known as Shell Crew, WebMasters, KungFu Kittens,\
      \ and PinkPanther.\_Deep Panda\_also appears to be known as Black Vine based\
      \ on the attribution of both group names to the Anthem intrusion. Some analysts\
      \ track\_Deep Panda\_and\_APT19\_as the same group, but it is unclear from open\
      \ source information if the groups are the same."
  - name: Earth Lusca
    id: G1006
    groups: TAG-22, Charcoal Typhoon, CHROMIUM, ControlX
    description: "Earth Lusca\_is a suspected China-based cyber espionage group that\
      \ has been active since at least April 2019.\_Earth Lusca\_has targeted organizations\
      \ in Australia, China, Hong Kong, Mongolia, Nepal, the Philippines, Taiwan,\
      \ Thailand, Vietnam, the United Arab Emirates, Nigeria, Germany, France, and\
      \ the United States. Targets included government institutions, news media outlets,\
      \ gambling companies, educational institutions, COVID-19 research organizations,\
      \ telecommunications companies, religious movements banned in China, and cryptocurrency\
      \ trading platforms; security researchers assess some\_Earth Lusca\_operations\
      \ may be financially motivated."
  - name: Elderwood
    id: G0066
    groups: Elderwood Gang, Beijing Group, Sneaky Panda
    description: "Elderwood\_is a suspected Chinese cyber espionage group that was\
      \ reportedly responsible for the 2009 Google intrusion known as Operation Aurora.\
      \ The group has targeted defense organizations, supply chain manufacturers,\
      \ human rights and nongovernmental organizations (NGOs), and IT service providers."
  - name: GALLIUM
    id: G0093
    groups: Granite Typhoon
    description: "GALLIUM\_is a cyberespionage group that has been active since at\
      \ least 2012, primarily targeting telecommunications companies, financial institutions,\
      \ and government entities in Afghanistan, Australia, Belgium, Cambodia, Malaysia,\
      \ Mozambique, the Philippines, Russia, and Vietnam. This group is particularly\
      \ known for launching Operation Soft Cell, a long-term campaign targeting telecommunications\
      \ providers. Security researchers have identified\_GALLIUM\_as a likely Chinese\
      \ state-sponsored group, based in part on tools used and TTPs commonly associated\
      \ with Chinese threat actors."
  - name: HAFNIUM
    id: G0125
    groups: Operation Exchange Marauder, Silk Typhoon
    description: "HAFNIUM\_is a likely state-sponsored cyber espionage group operating\
      \ out of China that has been active since at least January 2021.\_HAFNIUM\_\
      primarily targets entities in the US across a number of industry sectors, including\
      \ infectious disease researchers, law firms, higher education institutions,\
      \ defense contractors, policy think tanks, and NGOs.\_HAFNIUM\_has targeted\
      \ remote management tools and cloud software for intial access and has demonstrated\
      \ an ability to quickly operationalize exploits for identified vulnerabilities\
      \ in edge devices."
  - name: Higaisa
    id: G0126
    groups: nan
    description: "Higaisa\_is a threat group suspected to have South Korean origins.\_\
      Higaisa\_has targeted government, public, and trade organizations in North Korea;\
      \ however, they have also carried out attacks in China, Japan, Russia, Poland,\
      \ and other nations.\_Higaisa\_was first disclosed in early 2019 but is assessed\
      \ to have operated as early as 2009."
  - name: IndigoZebra
    id: G0136
    groups: nan
    description: "IndigoZebra\_is a suspected Chinese cyber espionage group that has\
      \ been targeting Central Asian governments since at least 2014."
  - name: Ke3chang
    id: G0004
    groups: APT15, Mirage, Vixen Panda, GREF, Playful Dragon, RoyalAPT, NICKEL, Nylon
      Typhoon
    description: "Ke3chang\_is a threat group attributed to actors operating out of\
      \ China.\_Ke3chang\_has targeted oil, government, diplomatic, military, and\
      \ NGOs in Central and South America, the Caribbean, Europe, and North America\
      \ since at least 2010."
  - name: Leviathan
    id: G0065
    groups: MUDCARP, Kryptonite Panda, Gadolinium, BRONZE MOHAWK, TEMP.Jumper, APT40,
      TEMP.Periscope, Gingham Typhoon
    description: "Leviathan\_is a Chinese state-sponsored cyber espionage group that\
      \ has been attributed to the Ministry of State Security's (MSS) Hainan State\
      \ Security Department and an affiliated front company. Active since at least\
      \ 2009,\_Leviathan\_has targeted the following sectors: academia, aerospace/aviation,\
      \ biomedical, defense industrial base, government, healthcare, manufacturing,\
      \ maritime, and transportation across the US, Canada, Australia, Europe, the\
      \ Middle East, and Southeast Asia."
  - name: LuminousMoth
    id: G1014
    groups: nan
    description: "LuminousMoth\_is a Chinese-speaking cyber espionage group that has\
      \ been active since at least October 2020.\_LuminousMoth\_has targeted high-profile\
      \ organizations, including government entities, in Myanmar, the Philippines,\
      \ Thailand, and other parts of Southeast Asia. Some security researchers have\
      \ concluded there is a connection between\_LuminousMoth\_and\_Mustang Panda\_\
      based on similar targeting and TTPs, as well as network infrastructure overlaps."
  - name: menuPass
    id: G0045
    groups: Cicada, POTASSIUM, Stone Panda, APT10, Red Apollo, CVNX, HOGFISH, BRONZE
      RIVERSIDE
    description: "menuPass\_is a threat group that has been active since at least\
      \ 2006. Individual members of\_menuPass\_are known to have acted in association\
      \ with the Chinese Ministry of State Security's (MSS) Tianjin State Security\
      \ Bureau and worked for the Huaying Haitai Science and Technology Development\
      \ Company."
  - name: MirrorFace
    id: G1054
    groups: Earth Kasha
    description: "MirrorFace\_is a People's Republic of China (PRC)-aligned cyberespionage\
      \ actor believed to be a subgroup under the\_menuPass\_umbrella based on targeting,\
      \ tools, and infrastructure overlaps.\_MirrorFace\_has been active since at\
      \ least 2019, at first exclusively targeting Japanese organizations across the\
      \ media, defense, diplomatic, financial, manufacturing, and academic sectors.\
      \ Subsequent\_MirrorFace\_operations included targets in Central Europe and\
      \ featured use of\_LODEINFO,\_HiddenFace, and\_UPPERCUT\_malware."
  - name: Moafee
    id: G0002
    groups: nan
    description: "Moafee\_is a threat group that appears to operate from the Guandong\
      \ Province of China. Due to overlapping TTPs, including similar custom tools,\
      \ Moafee is thought to have a direct or indirect relationship with the threat\
      \ group\_DragonOK."
  - name: Mofang
    id: G0103
    groups: nan
    description: "Mofang\_is a likely China-based cyber espionage group, named for\
      \ its frequent practice of imitating a victim's infrastructure. This adversary\
      \ has been observed since at least May 2012 conducting focused attacks against\
      \ government and critical infrastructure in Myanmar, as well as several other\
      \ countries and sectors including military, automobile, and weapons industries."
  - name: Mustang Panda
    id: G0129
    groups: TA416, RedDelta, BRONZE PRESIDENT, STATELY TAURUS, FIREANT, CAMARO DRAGON,
      EARTH PRETA, HIVE0154, TWILL TYPHOON, TANTALUM, LUMINOUS MOTH, UNC6384, TEMP.Hex,
      Red Lich, ClumsyToad
    description: "Mustang Panda\_is a China-based cyber espionage threat actor that\
      \ has been conducting operations since at least 2012.\_Mustang Panda\_has been\
      \ known to use tailored phishing lures and decoy documents to deliver malicious\
      \ payloads.\_Mustang Panda\_has targeted government, diplomatic, and non-governmental\
      \ organizations, including think tanks, religious institutions, and research\
      \ entities, across the United States, Europe, and Asia, with notable activity\
      \ in Russia, Mongolia, Myanmar, Pakistan, and Vietnam."
  - name: Naikon
    id: G0019
    groups: nan
    description: "Naikon\_is assessed to be a state-sponsored cyber espionage group\
      \ attributed to the Chinese People\u2019s Liberation Army\u2019s (PLA) Chengdu\
      \ Military Region Second Technical Reconnaissance Bureau (Military Unit Cover\
      \ Designator 78020). Active since at least 2010,\_Naikon\_has primarily conducted\
      \ operations against government, military, and civil organizations in Southeast\
      \ Asia, as well as against international bodies such as the United Nations Development\
      \ Programme (UNDP) and the Association of Southeast Asian Nations (ASEAN)."
  - name: PittyTiger
    id: G0011
    groups: nan
    description: "PittyTiger\_is a threat group believed to operate out of China that\
      \ uses multiple different types of malware to maintain command and control."
  - name: Putter Panda
    id: G0024
    groups: APT2, MSUpdater
    description: "Putter Panda\_is a Chinese threat group that has been attributed\
      \ to Unit 61486 of the 12th Bureau of the PLA\u2019s 3rd General Staff Department\
      \ (GSD)."
  - name: RedEcho
    id: G1042
    groups: nan
    description: "RedEcho\_is a People\u2019s Republic of China-related threat actor\
      \ associated with long-running intrusions in Indian critical infrastructure\
      \ entities.\_RedEcho\_overlaps with various other PRC-linked threat groups,\
      \ such as\_APT41, and is linked to\_ShadowPad\_malware use through shared infrastructure."
  - name: Rocke
    id: G0106
    groups: nan
    description: "Rocke\_is an alleged Chinese-speaking adversary whose primary objective\
      \ appeared to be cryptojacking, or stealing victim system resources for the\
      \ purposes of mining cryptocurrency. The name\_Rocke\_comes from the email address\
      \ \"rocke@live.cn\" used to create the wallet which held collected cryptocurrency.\
      \ Researchers have detected overlaps between\_Rocke\_and the Iron Cybercrime\
      \ Group, though this attribution has not been confirmed."
  - name: Salt Typhoon
    id: G1045
    groups: nan
    description: "Salt Typhoon\_is a People's Republic of China (PRC) state-backed\
      \ actor that has been active since at least 2019 and responsible for numerous\
      \ compromises of network infrastructure at major U.S. telecommunication and\
      \ internet service providers (ISP)."
  - name: Scarlet Mimic
    id: G0029
    groups: nan
    description: "Scarlet Mimic\_is a threat group that has targeted minority rights\
      \ activists. This group has not been directly linked to a government source,\
      \ but the group's motivations appear to overlap with those of the Chinese government.\
      \ While there is some overlap between IP addresses used by\_Scarlet Mimic\_\
      and\_Putter Panda, it has not been concluded that the groups are the same."
  - name: Sidewinder
    id: G0121
    groups: T-APT-04, Rattlesnake
    description: "Sidewinder\_is a suspected Indian threat actor group that has been\
      \ active since at least 2012. They have been observed targeting government,\
      \ military, and business entities throughout Asia, primarily focusing on Pakistan,\
      \ China, Nepal, and Afghanistan."
  - name: Strider
    id: G0041
    groups: ProjectSauron
    description: "Strider\_is a threat group that has been active since at least 2011\
      \ and has targeted victims in Russia, China, Sweden, Belgium, Iran, and Rwanda."
  - name: Suckfly
    id: G0039
    groups: nan
    description: "Suckfly\_is a China-based threat group that has been active since\
      \ at least 2014."
  - name: TA459
    id: G0062
    groups: nan
    description: "TA459\_is a threat group believed to operate out of China that has\
      \ targeted countries including Russia, Belarus, Mongolia, and others."
  - name: Threat Group-3390
    id: G0027
    groups: Earth Smilodon, TG-3390, Emissary Panda, BRONZE UNION, APT27, Iron Tiger,
      LuckyMouse, Linen Typhoon
    description: "Threat Group-3390\_is a Chinese threat group that has extensively\
      \ used strategic Web compromises to target victims. The group has been active\
      \ since at least 2010 and has targeted organizations in the aerospace, government,\
      \ defense, technology, energy, manufacturing and gambling/betting sectors."
  - name: Tonto Team
    id: G0131
    groups: Earth Akhlut, BRONZE HUNTLEY, CactusPete, Karma Panda
    description: "Tonto Team\_is a suspected Chinese state-sponsored cyber espionage\
      \ threat group that has primarily targeted South Korea, Japan, Taiwan, and the\
      \ United States since at least 2009; by 2020 they expanded operations to include\
      \ other Asian as well as Eastern European countries.\_Tonto Team\_has targeted\
      \ government, military, energy, mining, financial, education, healthcare, and\
      \ technology organizations, including through the Heartbeat Campaign (2009-2012)\
      \ and Operation Bitter Biscuit (2017)."
  - name: UNC3886
    id: G1048
    groups: nan
    description: "UNC3886\_is a China-nexus cyberespionage group that has been active\
      \ since at least 2022, targeting defense, technology, and telecommunication\
      \ organizations located in the United States and the Asia-Pacific-Japan (APJ)\
      \ regions.\_UNC3886\_has displayed a deep understanding of edge devices and\
      \ virtualization technologies through the exploitation of zero-day vulnerabilities\
      \ and the use of novel malware families and utilities."
  - name: Volt Typhoon
    id: G1017
    groups: BRONZE SILHOUETTE, Vanguard Panda, DEV-0391, UNC3236, Voltzite, Insidious
      Taurus, DazedToad
    description: "Volt Typhoon\_is a People's Republic of China (PRC) state-sponsored\
      \ actor that has been active since at least 2021, primarily targeting critical\
      \ infrastructure organizations in the US and its territories including Guam.\_\
      Volt Typhoon's targeting and pattern of behavior have been assessed as pre-positioning\
      \ to enable lateral movement to operational technology (OT) assets for potential\
      \ destructive or disruptive attacks.\_Volt Typhoon\_has emphasized stealth in\
      \ operations using web shells, living-off-the-land (LOTL) binaries, hands on\
      \ keyboard activities, and stolen credentials.. The group has leveraged compromised\
      \ SOHO routers to proxy command and control traffic and obscure its infrastructure,\
      \ activity associated with the KV botnet.."
  - name: Winnti Group
    id: G0044
    groups: Blackfly
    description: "Winnti Group\_is a threat group with Chinese origins that has been\
      \ active since at least 2010. The group has heavily targeted the gaming industry,\
      \ but it has also expanded the scope of its targeting. Some reporting suggests\
      \ a number of other groups, including\_Axiom,\_APT17, and\_Ke3chang, are closely\
      \ linked to\_Winnti Group."
  - name: ZIRCONIUM
    id: G0128
    groups: APT31, Violet Typhoon
    description: "ZIRCONIUM\_is a threat group operating out of China, active since\
      \ at least 2017, that has targeted individuals associated with the 2020 US presidential\
      \ election and prominent leaders in the international affairs community."
  - name: Threat Group-3390
    id: G0027
    groups: Earth Smilodon, TG-3390, Emissary Panda, BRONZE UNION, APT27, Iron Tiger,
      LuckyMouse, Linen Typhoon
    description: "Threat Group-3390\_is a Chinese threat group that has extensively\
      \ used strategic Web compromises to target victims. The group has been active\
      \ since at least 2010 and has targeted organizations in the aerospace, government,\
      \ defense, technology, energy, manufacturing and gambling/betting sectors."
  - name: Tonto Team
    id: G0131
    groups: Earth Akhlut, BRONZE HUNTLEY, CactusPete, Karma Panda
    description: "Tonto Team\_is a suspected Chinese state-sponsored cyber espionage\
      \ threat group that has primarily targeted South Korea, Japan, Taiwan, and the\
      \ United States since at least 2009; by 2020 they expanded operations to include\
      \ other Asian as well as Eastern European countries.\_Tonto Team\_has targeted\
      \ government, military, energy, mining, financial, education, healthcare, and\
      \ technology organizations, including through the Heartbeat Campaign (2009-2012)\
      \ and Operation Bitter Biscuit (2017)."
  - name: UNC3886
    id: G1048
    groups: nan
    description: "UNC3886\_is a China-nexus cyberespionage group that has been active\
      \ since at least 2022, targeting defense, technology, and telecommunication\
      \ organizations located in the United States and the Asia-Pacific-Japan (APJ)\
      \ regions.\_UNC3886\_has displayed a deep understanding of edge devices and\
      \ virtualization technologies through the exploitation of zero-day vulnerabilities\
      \ and the use of novel malware families and utilities."
  - name: Volt Typhoon
    id: G1017
    groups: BRONZE SILHOUETTE, Vanguard Panda, DEV-0391, UNC3236, Voltzite, Insidious
      Taurus, DazedToad
    description: "Volt Typhoon\_is a People's Republic of China (PRC) state-sponsored\
      \ actor that has been active since at least 2021, primarily targeting critical\
      \ infrastructure organizations in the US and its territories including Guam.\_\
      Volt Typhoon's targeting and pattern of behavior have been assessed as pre-positioning\
      \ to enable lateral movement to operational technology (OT) assets for potential\
      \ destructive or disruptive attacks.\_Volt Typhoon\_has emphasized stealth in\
      \ operations using web shells, living-off-the-land (LOTL) binaries, hands on\
      \ keyboard activities, and stolen credentials.. The group has leveraged compromised\
      \ SOHO routers to proxy command and control traffic and obscure its infrastructure,\
      \ activity associated with the KV botnet.."
  - name: Winnti Group
    id: G0044
    groups: Blackfly
    description: "Winnti Group\_is a threat group with Chinese origins that has been\
      \ active since at least 2010. The group has heavily targeted the gaming industry,\
      \ but it has also expanded the scope of its targeting. Some reporting suggests\
      \ a number of other groups, including\_Axiom,\_APT17, and\_Ke3chang, are closely\
      \ linked to\_Winnti Group."
  - name: ZIRCONIUM
    id: G0128
    groups: APT31, Violet Typhoon
    description: "ZIRCONIUM\_is a threat group operating out of China, active since\
      \ at least 2017, that has targeted individuals associated with the 2020 US presidential\
      \ election and prominent leaders in the international affairs community."
  Iran:
  - name: Agrius
    id: G1030
    groups: Pink Sandstorm, AMERICIUM, Agonizing Serpens, BlackShadow
    description: "Agrius\_is an Iranian threat actor active since 2020 notable for\
      \ a series of ransomware and wiper operations in the Middle East, with an emphasis\
      \ on Israeli targets. Public reporting has linked\_Agrius\_to Iran's Ministry\
      \ of Intelligence and Security (MOIS)."
  - name: Ajax Security Team
    id: G0130
    groups: Operation Woolen-Goldfish, AjaxTM, Rocket Kitten, Flying Kitten, Operation
      Saffron Rose
    description: "Ajax Security Team\_is a group that has been active since at least\
      \ 2010 and believed to be operating out of Iran. By 2014\_Ajax Security Team\_\
      transitioned from website defacement operations to malware-based cyber espionage\
      \ campaigns targeting the US defense industrial base and Iranian users of anti-censorship\
      \ technologies."
  - name: APT33
    id: G0064
    groups: HOLMIUM, Elfin, Peach Sandstorm
    description: "APT33\_is a suspected Iranian threat group that has carried out\
      \ operations since at least 2013. The group has targeted organizations across\
      \ multiple industries in the United States, Saudi Arabia, and South Korea, with\
      \ a particular interest in the aviation and energy sectors."
  - name: APT39
    id: G0087
    groups: ITG07, Chafer, Remix Kitten
    description: "APT39\_is one of several names for cyber espionage activity conducted\
      \ by the Iranian Ministry of Intelligence and Security (MOIS) through the front\
      \ company Rana Intelligence Computing since at least 2014.\_APT39\_has primarily\
      \ targeted the travel, hospitality, academic, and telecommunications industries\
      \ in Iran and across Asia, Africa, Europe, and North America to track individuals\
      \ and entities considered to be a threat by the MOIS."
  - name: APT42
    id: G1044
    groups: nan
    description: "APT42\_is an Iranian-sponsored threat group that conducts cyber\
      \ espionage and surveillance. The group primarily focuses on targets in the\
      \ Middle East region, but has targeted a variety of industries and countries\
      \ since at least 2015.\_APT42\_starts cyber operations through spearphishing\
      \ emails and/or the PINEFLOWER Android malware, then monitors and collects information\
      \ from the compromised systems and devices. Finally,\_APT42\_exfiltrates data\
      \ using native features and open-source tools."
  - name: Cleaver
    id: G0003
    groups: Threat Group 2889, TG-2889
    description: "Cleaver\_is a threat group that has been attributed to Iranian actors\
      \ and is responsible for activity tracked as Operation Cleaver. Strong circumstantial\
      \ evidence suggests Cleaver is linked to Threat Group 2889 (TG-2889)."
  - name: CopyKittens
    id: G0052
    groups: nan
    description: "CopyKittens\_is an Iranian cyber espionage group that has been operating\
      \ since at least 2013. It has targeted countries including Israel, Saudi Arabia,\
      \ Turkey, the U.S., Jordan, and Germany. The group is responsible for the campaign\
      \ known as Operation Wilted Tulip."
  - name: CURIUM
    id: G1012
    groups: Crimson Sandstorm, TA456, Tortoise Shell, Yellow Liderc
    description: "CURIUM\_is an Iranian threat group, first reported in September\
      \ 2019 and active since at least July 2018, targeting IT service providers in\
      \ the Middle East.\_CURIUM\_has since invested in building relationships with\
      \ potential targets via social media over a period of months to establish trust\
      \ and confidence before sending malware. Security researchers note\_CURIUM\_\
      has demonstrated great patience and persistence by chatting with potential targets\
      \ daily and sending benign files to help lower their security consciousness."
  - name: CyberAv3ngers
    id: G1027
    groups: Soldiers of Soloman
    description: "The\_CyberAv3ngers\_are a suspected Iranian Government Islamic Revolutionary\
      \ Guard Corps (IRGC)-affiliated APT group. The\_CyberAv3ngers\_have been known\
      \ to be active since at least 2020, with disputed and false claims of critical\
      \ infrastructure compromises in Israel."
  - name: Ferocious Kitten
    id: G0137
    groups: nan
    description: "Ferocious Kitten\_is a threat group that has primarily targeted\
      \ Persian-speaking individuals in Iran since at least 2015."
  - name: Fox Kitten
    id: G0117
    groups: UNC757, Parisite, Pioneer Kitten, RUBIDIUM, Lemon Sandstorm
    description: "Fox Kitten\_is threat actor with a suspected nexus to the Iranian\
      \ government that has been active since at least 2017 against entities in the\
      \ Middle East, North Africa, Europe, Australia, and North America.\_Fox Kitten\_\
      has targeted multiple industrial verticals including oil and gas, technology,\
      \ government, defense, healthcare, manufacturing, and engineering."
  - name: Group5
    id: G0043
    groups: nan
    description: "Group5\_is a threat group with a suspected Iranian nexus, though\
      \ this attribution is not definite. The group has targeted individuals connected\
      \ to the Syrian opposition via spearphishing and watering holes, normally using\
      \ Syrian and Iranian themes.\_Group5\_has used two commonly available remote\
      \ access tools (RATs),\_njRAT\_and\_NanoCore, as well as an Android RAT, DroidJack."
  - name: Leafminer
    id: G0077
    groups: Raspite
    description: "Leafminer\_is an Iranian threat group that has targeted government\
      \ organizations and business entities in the Middle East since at least early\
      \ 2017."
  - name: Magic Hound
    id: G0059
    groups: TA453, COBALT ILLUSION, Charming Kitten, ITG18, Phosphorus, Newscaster,
      APT35, Mint Sandstorm
    description: "Magic Hound\_is an Iranian-sponsored threat group that conducts\
      \ long term, resource-intensive cyber espionage operations, likely on behalf\
      \ of the Islamic Revolutionary Guard Corps. They have targeted European, U.S.,\
      \ and Middle Eastern government and military personnel, academics, journalists,\
      \ and organizations such as the World Health Organization (WHO), via complex\
      \ social engineering campaigns since at least 2014."
  - name: Moses Staff
    id: G1009
    groups: DEV-0500, Marigold Sandstorm
    description: "Moses Staff\_is a suspected Iranian threat group that has primarily\
      \ targeted Israeli companies since at least September 2021.\_Moses Staff\_openly\
      \ stated their motivation in attacking Israeli companies is to cause damage\
      \ by leaking stolen sensitive data and encrypting the victim's networks without\
      \ a ransom demand."
  - name: MuddyWater
    id: G0069
    groups: Earth Vetala, MERCURY, Static Kitten, Seedworm, TEMP.Zagros, Mango Sandstorm,
      TA450, MuddyKrill
    description: "MuddyWater\_is a cyber espionage group assessed to be a subordinate\
      \ element within Iran's Ministry of Intelligence and Security (MOIS). Since\
      \ at least 2017,\_MuddyWater\_has targeted a range of government and private\
      \ organizations across sectors, including telecommunications, local government,\
      \ finance, defense, and oil and natural gas organizations, in the Middle East\
      \ (specifically the UAE and Saudi Arabia), Asia, Africa, Europe, and North America.\_\
      MuddyWater\_has reused domains dating back to October 2025, and has a preference\
      \ for NameCheap and Hosterdaddy Private Limited (AS136557). In late 2025 and\
      \ early 2026,\_MuddyWater\_used commercial satellite internet (i.e., Starlink)\
      \ for command and control (C2) communication."
  - name: OilRig
    id: G0049
    groups: COBALT GYPSY, IRN2, APT34, Helix Kitten, Evasive Serpens, Hazel Sandstorm,
      EUROPIUM, ITG13, Earth Simnavaz, Crambus, TA452
    description: "OilRig\_is a suspected Iranian threat group that has targeted Middle\
      \ Eastern and international victims since at least 2014. The group has targeted\
      \ a variety of sectors, including financial, government, energy, chemical, and\
      \ telecommunications. It appears the group carries out supply chain attacks,\
      \ leveraging the trust relationship between organizations to attack their primary\
      \ targets. The group works on behalf of the Iranian government based on infrastructure\
      \ details that contain references to Iran, use of Iranian infrastructure, and\
      \ targeting that aligns with nation-state interests."
  - name: POLONIUM
    id: G1005
    groups: Plaid Rain
    description: "POLONIUM\_is a Lebanon-based group that has primarily targeted Israeli\
      \ organizations, including critical manufacturing, information technology, and\
      \ defense industry companies, since at least February 2022. Security researchers\
      \ assess\_POLONIUM\_has coordinated their operations with multiple actors affiliated\
      \ with Iran\u2019s Ministry of Intelligence and Security (MOIS), based on victim\
      \ overlap as well as common techniques and tooling."
  - name: Silent Librarian
    id: G0122
    groups: TA407, COBALT DICKENS
    description: "Silent Librarian\_is a group that has targeted research and proprietary\
      \ data at universities, government agencies, and private sector companies worldwide\
      \ since at least 2013. Members of\_Silent Librarian\_are known to have been\
      \ affiliated with the Iran-based Mabna Institute which has conducted cyber intrusions\
      \ at the behest of the government of Iran, specifically the Islamic Revolutionary\
      \ Guard Corps (IRGC)."
  - name: UNC788
    id: G1029
    groups: nan
    description: "UNC788\_is a group of hackers from Iran that has targeted people\
      \ in the Middle East."
  - name: VOID MANTICORE
    id: G1055
    groups: COBALT MYSTIQUE, Handala Hack, Homeland Justice, Karma, Karmabelow80,
      BANISHED KITTEN, Red Sandstorm
    description: "VOID MANTICORE\_is a threat group assessed to operate on behalf\
      \ of Iran\u2019s Ministry of Intelligence and Security (MOIS). Active since\
      \ at least mid-2022, VOID MANTICORE has targeted government entities, critical\
      \ infrastructure, and private sector organizations across Albania, Israel, and\
      \ the United States.\_VOID MANTICORE\_conducts destructive cyber operations,\
      \ combining wiper attacks with hack-and-leak campaigns. The group has operated\
      \ under multiple public-facing personas, including\_HomeLand Justice\_in operations\
      \ against Albania, Karma and Karma Below in campaigns targeting Israeli organizations,\
      \ and Handala Hack, its current primary persona, which has claimed activity\
      \ against Israeli and U.S. entities, including a March 2026 attack against Stryker\
      \ Corporation.\_VOID MANTICORE\_has been observed collaborating with Scarred\
      \ Manticore, which has been linked to initial access operations preceding VOID\
      \ MANTICORE\u2019s activity."
  - name: UNC788
    id: G1029
    groups: nan
    description: "UNC788\_is a group of hackers from Iran that has targeted people\
      \ in the Middle East."
  - name: VOID MANTICORE
    id: G1055
    groups: COBALT MYSTIQUE, Handala Hack, Homeland Justice, Karma, Karmabelow80,
      BANISHED KITTEN, Red Sandstorm
    description: "VOID MANTICORE\_is a threat group assessed to operate on behalf\
      \ of Iran\u2019s Ministry of Intelligence and Security (MOIS). Active since\
      \ at least mid-2022, VOID MANTICORE has targeted government entities, critical\
      \ infrastructure, and private sector organizations across Albania, Israel, and\
      \ the United States.\_VOID MANTICORE\_conducts destructive cyber operations,\
      \ combining wiper attacks with hack-and-leak campaigns. The group has operated\
      \ under multiple public-facing personas, including\_HomeLand Justice\_in operations\
      \ against Albania, Karma and Karma Below in campaigns targeting Israeli organizations,\
      \ and Handala Hack, its current primary persona, which has claimed activity\
      \ against Israeli and U.S. entities, including a March 2026 attack against Stryker\
      \ Corporation.\_VOID MANTICORE\_has been observed collaborating with Scarred\
      \ Manticore, which has been linked to initial access operations preceding VOID\
      \ MANTICORE\u2019s activity."
  Cyber Crime:
  - name: Akira
    id: G1024
    groups: GOLD SAHARA, PUNK SPIDER, Howling Scorpius
    description: "Akira\_is a ransomware variant and ransomware deployment entity\
      \ active since at least March 2023.\_Akira\_uses compromised credentials to\
      \ access single-factor external access mechanisms such as VPNs for initial access,\
      \ then various publicly-available tools and techniques for lateral movement.\_\
      Akira\_operations are associated with \"double extortion\" ransomware activity,\
      \ where data is exfiltrated from victim environments prior to encryption, with\
      \ threats to publish files if a ransom is not paid. Technical analysis of\_\
      Akira\_ransomware indicates variants capable of targeting Windows or VMWare\
      \ ESXi hypervisors and multiple overlaps with\_Conti\_ransomware."
  - name: APT-C-36
    id: G0099
    groups: Blind Eagle, TAG-144, AguilaCiega, APT-Q-98
    description: "APT-C-36\_is a suspected South American threat group that has engaged\
      \ in espionage and financially motivated operations since at least 2018.\_APT-C-36\_\
      has targeted government institutions and entities in the financial, energy,\
      \ and professional manufacturing sectors across Colombia and other Latin American\
      \ countries."
  - name: BlackByte
    id: G1043
    groups: Hecamede
    description: "BlackByte\_is a ransomware threat actor operating since at least\
      \ 2021.\_BlackByte\_is associated with several versions of ransomware also labeled\_\
      BlackByte Ransomware.\_BlackByte\_ransomware operations initially used a common\
      \ encryption key allowing for the development of a universal decryptor, but\
      \ subsequent versions such as\_BlackByte 2.0 Ransomware\_use more robust encryption\
      \ mechanisms.\_BlackByte\_is notable for operations targeting critical infrastructure\
      \ entities among other targets across North America."
  - name: Cobalt Group
    id: G0080
    groups: GOLD KINGSWOOD, Cobalt Gang, Cobalt Spider
    description: "Cobalt Group\_is a financially motivated threat group that has primarily\
      \ targeted financial institutions since at least 2016. The group has conducted\
      \ intrusions to steal money via targeting ATM systems, card processing, payment\
      \ systems and SWIFT systems.\_Cobalt Group\_has mainly targeted banks in Eastern\
      \ Europe, Central Asia, and Southeast Asia. One of the alleged leaders was arrested\
      \ in Spain in early 2018, but the group still appears to be active. The group\
      \ has been known to target organizations in order to use their access to then\
      \ compromise additional victims. Reporting indicates there may be links between\_\
      Cobalt Group\_and both the malware\_Carbanak\_and the group\_Carbanak."
  - name: DarkVishnya
    id: G0105
    groups: nan
    description: "DarkVishnya\_is a financially motivated threat actor targeting financial\
      \ institutions in Eastern Europe. In 2017-2018 the group attacked at least 8\
      \ banks in this region."
  - name: Evilnum
    id: G0120
    groups: nan
    description: "Evilnum\_is a financially motivated threat group that has been active\
      \ since at least 2018."
  - name: EXOTIC LILY
    id: G1011
    groups: nan
    description: "EXOTIC LILY\_is a financially motivated group that has been closely\
      \ linked with\_Wizard Spider\_and the deployment of ransomware including\_Conti\_\
      and\_Diavol.\_EXOTIC LILY\_may be acting as an initial access broker for other\
      \ malicious actors, and has targeted a wide range of industries including IT,\
      \ cybersecurity, and healthcare since at least September 2021."
  - name: FIN10
    id: G0051
    groups: nan
    description: "FIN10\_is a financially motivated threat group that has targeted\
      \ organizations in North America since at least 2013 through 2016. The group\
      \ uses stolen data exfiltrated from victims to extort organizations."
  - name: FIN13
    id: G1016
    groups: Elephant Beetle
    description: "FIN13\_is a financially motivated cyber threat group that has targeted\
      \ the financial, retail, and hospitality industries in Mexico and Latin America,\
      \ as early as 2016.\_FIN13\_achieves its objectives by stealing intellectual\
      \ property, financial data, mergers and acquisition information, or PII."
  - name: FIN7
    id: G0046
    groups: GOLD NIAGARA, ITG14, Carbon Spider, ELBRUS, Sangria Tempest
    description: "FIN7\_is a financially-motivated threat group that has been active\
      \ since 2013.\_FIN7\_has targeted the retail, restaurant, hospitality, software,\
      \ consulting, financial services, medical equipment, cloud services, media,\
      \ food and beverage, transportation, pharmaceutical, and utilities industries\
      \ in the United States. A portion of\_FIN7\_was operated out of a front company\
      \ called Combi Security and often used point-of-sale malware for targeting efforts.\
      \ Since 2020,\_FIN7\_shifted operations to big game hunting (BGH), including\
      \ use of\_REvil\_ransomware and their own Ransomware-as-a-Service (RaaS), Darkside.\
      \ FIN7 may be linked to the\_Carbanak\_Group, but multiple threat groups have\
      \ been observed using\_Carbanak, leading these groups to be tracked separately."
  - name: FIN8
    id: G0061
    groups: Syssphinx
    description: "FIN8\_is a financially motivated threat group that has been active\
      \ since at least January 2016, and known for targeting organizations in the\
      \ hospitality, retail, entertainment, insurance, technology, chemical, and financial\
      \ sectors. In June 2021, security researchers detected\_FIN8\_switching from\
      \ targeting point-of-sale (POS) devices to distributing a number of ransomware\
      \ variants."
  - name: GOLD SOUTHFIELD
    id: G0115
    groups: Pinchy Spider
    description: "GOLD SOUTHFIELD\_is a financially motivated threat group active\
      \ since at least 2018 that operates the\_REvil\_Ransomware-as-a Service (RaaS).\_\
      GOLD SOUTHFIELD\_provides backend infrastructure for affiliates recruited on\
      \ underground forums to perpetrate high value deployments. By early 2020,\_\
      GOLD SOUTHFIELD\_started capitalizing on the new trend of stealing data and\
      \ further extorting the victim to pay for their data to not get publicly leaked."
  - name: INC Ransom
    id: G1032
    groups: GOLD IONIC
    description: "INC Ransom\_is a ransomware and data extortion threat group associated\
      \ with the deployment of\_INC Ransomware\_that has been active since at least\
      \ July 2023.\_INC Ransom\_has targeted organizations worldwide most commonly\
      \ in the industrial, healthcare, and education sectors in the US and Europe."
  - name: LAPSUS$
    id: G1004
    groups: DEV-0537, Strawberry Tempest
    description: "LAPSUS$\_is cyber criminal threat group that has been active since\
      \ at least mid-2021.\_LAPSUS$\_specializes in large-scale social engineering\
      \ and extortion operations, including destructive attacks without the use of\
      \ ransomware. The group has targeted organizations globally, including in the\
      \ government, manufacturing, higher education, energy, healthcare, technology,\
      \ telecommunications, and media sectors."
  - name: Malteiro
    id: G1026
    groups: nan
    description: "Malteiro\_is a financially motivated criminal group that is likely\
      \ based in Brazil and has been active since at least November 2019. The group\
      \ operates and distributes the\_Mispadu\_banking trojan via a Malware-as-a-Service\
      \ (MaaS) business model.\_Malteiro\_mainly targets victims throughout Latin\
      \ America (particularly Mexico) and Europe (particularly Spain and Portugal)."
  - name: Medusa Group
    id: G1051
    groups: nan
    description: "Medusa Group\_has been active since at least 2021 and was initially\
      \ operated as a closed ransomware group before evolving into a Ransomware-as-a-Service\
      \ (RaaS) operation. Some reporting indicates that certain attacks may still\
      \ be conducted directly by the ransomware\u2019s core developers. Public sources\
      \ have also referred to the group as \"Spearwing\" or \"Medusa Actors.\"\_Medusa\
      \ Group\_employs living-off-the-land techniques, frequently leveraging publicly\
      \ available tools and common remote management software to conduct operations.\
      \ The group engages in double extortion tactics, exfiltrating data prior to\
      \ encryption and threatening to publish stolen information if ransom demands\
      \ are not met. For initial access,\_Medusa Group\_has exploited publicly known\
      \ vulnerabilities, conducted phishing campaigns, and used credentials or access\
      \ purchased from Initial Access Brokers (IABs). The group is opportunistic and\
      \ has targeted a wide range of sectors globally."
  - name: Play
    id: G1040
    groups: nan
    description: "Play\_is a ransomware group that has been active since at least\
      \ 2022 deploying\_Playcrypt\_ransomware against the business, government, critical\
      \ infrastructure, healthcare, and media sectors in North America, South America,\
      \ and Europe.\_Play\_actors employ a double-extortion model, encrypting systems\
      \ after exfiltrating data, and are presumed by security researchers to operate\
      \ as a closed group."
  - name: Storm-0501
    id: G1053
    groups: nan
    description: "Storm-0501\_is a financially motivated cyber criminal group that\
      \ uses commodity and open-source tools to conduct ransomware operations.\_Storm-0501\_\
      has been active since 2021 and has previously been affiliated with Sabbath Ransomware\
      \ and other Ransomware-as-a-Service (RaaS) variants such as Hive,\_BlackCat,\
      \ Hunters International,\_LockBit 3.0, and\_Embargo\_ransomware."
  - name: Storm-1811
    id: G1046
    groups: nan
    description: "Storm-1811\_is a financially-motivated entity linked to\_Black Basta\_\
      ransomware deployment.\_Storm-1811\_is notable for unique phishing and social\
      \ engineering mechanisms for initial access, such as overloading victim email\
      \ inboxes with non-malicious spam to prompt a fake \"help desk\" interaction\
      \ leading to the deployment of adversary tools and capabilities."
  - name: TA505
    id: G0092
    groups: Hive0065, Spandex Tempest, CHIMBORAZO
    description: "TA505\_is a cyber criminal group that has been active since at least\
      \ 2014.\_TA505\_is known for frequently changing malware, driving global trends\
      \ in criminal malware distribution, and ransomware campaigns involving\_Clop."
  Russia:
  - name: ALLANITE
    id: G1000
    groups: Palmetto Fusion
    description: "ALLANITE\_is a suspected Russian cyber espionage group, that has\
      \ primarily targeted the electric utility sector within the United States and\
      \ United Kingdom. The group's tactics and techniques are reportedly similar\
      \ to\_Dragonfly, although\_ALLANITEs technical capabilities have not exhibited\
      \ disruptive or destructive abilities. It has been suggested that the group\
      \ maintains a presence in ICS for the purpose of gaining understanding of processes\
      \ and to maintain persistence."
  - name: APT28
    id: G0007
    groups: IRON TWILIGHT, SNAKEMACKEREL, Swallowtail, Group 74, Sednit, Sofacy, Pawn
      Storm, Fancy Bear, STRONTIUM, Tsar Team, Threat Group-4127, TG-4127, Forest
      Blizzard, FROZENLAKE, GruesomeLarch
    description: "APT28\_is a threat group that has been attributed to Russia's General\
      \ Staff Main Intelligence Directorate (GRU) 85th Main Special Service Center\
      \ (GTsSS) military unit 26165. This group has been active since at least 2004."
  - name: APT29
    id: G0016
    groups: IRON RITUAL, IRON HEMLOCK, NobleBaron, Dark Halo, NOBELIUM, UNC2452, YTTRIUM,
      The Dukes, Cozy Bear, CozyDuke, SolarStorm, Blue Kitsune, UNC3524, Midnight
      Blizzard
    description: "APT29\_is threat group that has been attributed to Russia's Foreign\
      \ Intelligence Service (SVR). They have operated since at least 2008, often\
      \ targeting government networks in Europe and NATO member countries, research\
      \ institutes, and think tanks.\_APT29\_reportedly compromised the Democratic\
      \ National Committee starting in the summer of 2015."
  - name: Dragonfly
    id: G0035
    groups: TEMP.Isotope, DYMALLOY, Berserk Bear, TG-4192, Crouching Yeti, IRON LIBERTY,
      Energetic Bear, Ghost Blizzard, BROMINE
    description: "Dragonfly\_is a cyber espionage group that has been attributed to\
      \ Russia's Federal Security Service (FSB) Center 16. Active since at least 2010,\_\
      Dragonfly\_has targeted defense and aviation companies, government entities,\
      \ companies related to industrial control systems, and critical infrastructure\
      \ sectors worldwide through supply chain, spearphishing, and drive-by compromise\
      \ attacks."
  - name: Ember Bear
    id: G1003
    groups: UNC2589, Bleeding Bear, DEV-0586, Cadet Blizzard, Frozenvista, UAC-0056
    description: "Ember Bear\_is a Russian state-sponsored cyber espionage group that\
      \ has been active since at least 2020, linked to Russia's General Staff Main\
      \ Intelligence Directorate (GRU) 161st Specialist Training Center (Unit 29155).\_\
      Ember Bear\_has primarily focused operations against Ukrainian government and\
      \ telecommunication entities, but has also operated against critical infrastructure\
      \ entities in Europe and the Americas.\_Ember Bear\_conducted the\_WhisperGate\_\
      destructive wiper attacks against Ukraine in early 2022. There is some confusion\
      \ as to whether\_Ember Bear\_overlaps with another Russian-linked entity referred\
      \ to as\_Saint Bear. At present available evidence strongly suggests these are\
      \ distinct activities with different behavioral profiles."
  - name: FIN5
    id: G0053
    groups: nan
    description: "FIN5\_is a financially motivated threat group that has targeted\
      \ personally identifiable information and payment card information. The group\
      \ has been active since at least 2008 and has targeted the restaurant, gaming,\
      \ and hotel industries. The group is made up of actors who likely speak Russian."
  - name: Gamaredon Group
    id: G0047
    groups: IRON TILDEN, Primitive Bear, ACTINIUM, Armageddon, Shuckworm, DEV-0157,
      Aqua Blizzard, NastyShrew
    description: "Gamaredon Group\_is a suspected Russian cyber espionage group that\
      \ has targeted military, law enforcement, judiciary, non-profit, and non-governmental\
      \ organizations in Ukraine since at least 2013. The name\_Gamaredon Group\_\
      derives from a misspelling of the word \"Armageddon,\" found in early campaigns."
  - name: Gorgon Group
    id: G0078
    groups: nan
    description: "Gorgon Group\_is a threat group consisting of members who are suspected\
      \ to be Pakistan-based or have other connections to Pakistan. The group has\
      \ performed a mix of criminal and targeted attacks, including campaigns against\
      \ government organizations in the United Kingdom, Spain, Russia, and the United\
      \ States."
  - name: Inception
    id: G0100
    groups: Inception Framework, Cloud Atlas
    description: "Inception\_is a cyber espionage group active since at least 2014.\
      \ The group has targeted multiple industries and governmental entities primarily\
      \ in Russia, but has also been active in the United States and throughout Europe,\
      \ Asia, Africa, and the Middle East."
  - name: Indrik Spider
    id: G0119
    groups: Evil Corp, Manatee Tempest, DEV-0243, UNC2165
    description: "Indrik Spider\_is a Russia-based cybercriminal group that has been\
      \ active since at least 2014.\_Indrik Spider\_initially started with the\_Dridex\_\
      banking Trojan, and then by 2017 they began running ransomware operations using\_\
      BitPaymer,\_WastedLocker, and Hades ransomware. Following U.S. sanctions and\
      \ an indictment in 2019,\_Indrik Spider\_changed their tactics and diversified\
      \ their toolset."
  - name: Kimsuky
    id: G0094
    groups: Black Banshee, Velvet Chollima, Emerald Sleet, THALLIUM, APT43, TA427,
      Springtail, Earth Kumiho, PatheticSlug
    description: "Kimsuky\_is a Democratic People's Republic of Korea (DPRK)-based\
      \ cyber espionage group that has been active since at least 2012. The group\
      \ initially targeted South Korean government agencies, think tanks, and subject-matter\
      \ experts in various fields. Its operations expanded to include the United Nations\
      \ and organizations in the government, education, business services, and manufacturing\
      \ sectors across the United States, Japan, Russia, and Europe.\_Kimsuky\_has\
      \ focused collection on foreign policy and national security issues tied to\
      \ the Korean Peninsula, nuclear policy, and sanctions.\_Kimsuky\_operations\
      \ have overlapped with those of other North Korean state-sponsored cyber espionage\
      \ actors as a result of ad hoc collaborations or other limited resource sharing."
  - name: Machete
    id: G0095
    groups: APT-C-43, El Machete
    description: "Machete\_is a suspected Spanish-speaking cyber espionage group that\
      \ has been active since at least 2010. It has primarily focused its operations\
      \ within Latin America, with a particular emphasis on Venezuela, but also in\
      \ the US, Europe, Russia, and parts of Asia.\_Machete\_generally targets high-profile\
      \ organizations such as government institutions, intelligence services, and\
      \ military units, as well as telecommunications and power companies."
  - name: Nomadic Octopus
    id: G0133
    groups: DustSquad
    description: "Nomadic Octopus\_is a Russian-speaking cyber espionage threat group\
      \ that has primarily targeted Central Asia, including local governments, diplomatic\
      \ missions, and individuals, since at least 2014.\_Nomadic Octopus\_has been\
      \ observed conducting campaigns involving Android and Windows malware, mainly\
      \ using the Delphi programming language, and building custom variants."
  - name: RedCurl
    id: G1039
    groups: nan
    description: "RedCurl\_is a threat actor active since 2018 notable for corporate\
      \ espionage targeting a variety of locations, including Ukraine, Canada and\
      \ the United Kingdom, and a variety of industries, including but not limited\
      \ to travel agencies, insurance companies, and banks.\_RedCurl\_is allegedly\
      \ a Russian-speaking threat actor. The group\u2019s operations typically start\
      \ with spearphishing emails to gain initial access, then the group executes\
      \ discovery and collection commands and scripts to find corporate data. The\
      \ group concludes operations by exfiltrating files to the C2 servers."
  - name: RTM
    id: G0048
    groups: nan
    description: "RTM\_is a cybercriminal group that has been active since at least\
      \ 2015 and is primarily interested in users of remote banking systems in Russia\
      \ and neighboring countries. The group uses a Trojan by the same name (RTM)."
  - name: Saint Bear
    id: G1031
    groups: Storm-0587, TA471, UAC-0056, Lorec53
    description: "Saint Bear\_is a Russian-nexus threat actor active since early 2021,\
      \ primarily targeting entities in Ukraine and Georgia. The group is notable\
      \ for a specific remote access tool,\_Saint Bot, and information stealer,\_\
      OutSteel\_in campaigns.\_Saint Bear\_typically relies on phishing or web staging\
      \ of malicious documents and related file types for initial access, spoofing\
      \ government or related entities.\_Saint Bear\_has previously been confused\
      \ with\_Ember Bear\_operations, but analysis of behaviors, tools, and targeting\
      \ indicates these are distinct clusters."
  - name: Sandworm Team
    id: G0034
    groups: ELECTRUM, Telebots, IRON VIKING, BlackEnergy (Group), Quedagh, Voodoo
      Bear, IRIDIUM, Seashell Blizzard, FROZENBARENTS, APT44
    description: "Sandworm Team\_is a destructive threat group that has been attributed\
      \ to Russia's General Staff Main Intelligence Directorate (GRU) Main Center\
      \ for Special Technologies (GTsST) military unit 74455. This group has been\
      \ active since at least 2009."
  - name: Silence
    id: G0091
    groups: Whisper Spider
    description: "Silence\_is a financially motivated threat actor targeting financial\
      \ institutions in different countries. The group was first seen in June 2016.\
      \ Their main targets reside in Russia, Ukraine, Belarus, Azerbaijan, Poland\
      \ and Kazakhstan. They compromised various banking systems, including the Russian\
      \ Central Bank's Automated Workstation Client, ATMs, and card processing."
  - name: Star Blizzard
    id: G1033
    groups: SEABORGIUM, Callisto Group, TA446, COLDRIVER
    description: "Star Blizzard\_is a cyber espionage and influence group originating\
      \ in Russia that has been active since at least 2019.\_Star Blizzard\_campaigns\
      \ align closely with Russian state interests and have included persistent phishing\
      \ and credential theft against academic, defense, government, NGO, and think\
      \ tank organizations in NATO countries, particularly the US and the UK."
  - name: TEMP.Veles
    id: G0088
    groups: XENOTIME
    description: "TEMP.Veles\_is a Russia-based threat group that has targeted critical\
      \ infrastructure. The group has been observed utilizing\_TRITON, a malware framework\
      \ designed to manipulate industrial safety systems."
  - name: Turla
    id: G0010
    groups: IRON HUNTER, Group 88, Waterbug, WhiteBear, Snake, Krypton, Venomous Bear,
      Secret Blizzard, BELUGASTURGEON
    description: "Turla\_is a cyber espionage threat group that has been attributed\
      \ to Russia's Federal Security Service (FSB). They have compromised victims\
      \ in over 50 countries since at least 2004, spanning a range of industries including\
      \ government, embassies, military, education, research and pharmaceutical companies.\_\
      Turla\_is known for conducting watering hole and spearphishing campaigns, and\
      \ leveraging in-house tools and malware, such as\_Uroburos."
  - name: Water Galura
    id: G1050
    groups: GOLD FEATHER
    description: "Water Galura\_are the operators of the\_Qilin\_Ransomware-as-a-Service\
      \ (RaaS) who handle payload generation, ransom negotiations, and the publication\
      \ of stolen data for\_Qilin\_affilates recruited on Russian cybercrime forums.\_\
      Water Galura\_have been active since at least 2022 and use a double extortion\
      \ model where they demand payment for providing decryption keys and for refraining\
      \ from publishing the stolen data to their leak site."
  - name: Winter Vivern
    id: G1035
    groups: TA473, UAC-0114
    description: Winter Vivern is a group linked to Russian and Belorussian interests
      active since at least 2020 targeting various European government and NGO entities,
      along with sporadic targeting of Indian and US victims. The group leverages
      a combination of document-based phishing activity and server-side exploitation
      for initial access, leveraging adversary-controlled and -created infrastructure
      for follow-on command and control.
  - name: Wizard Spider
    id: G0102
    groups: UNC1878, TEMP.MixMaster, Grim Spider, FIN12, GOLD BLACKBURN, ITG23, Periwinkle
      Tempest, DEV-0193, Pistachio Tempest, DEV-0237
    description: "Wizard Spider\_is a Russia-based financially motivated threat group\
      \ originally known for the creation and deployment of\_TrickBot\_since at least\
      \ 2016.\_Wizard Spider\_possesses a diverse arsenal of tools and has conducted\
      \ ransomware campaigns against a variety of organizations, ranging from major\
      \ corporations to hospitals."
  - name: TEMP.Veles
    id: G0088
    groups: XENOTIME
    description: "TEMP.Veles\_is a Russia-based threat group that has targeted critical\
      \ infrastructure. The group has been observed utilizing\_TRITON, a malware framework\
      \ designed to manipulate industrial safety systems."
  - name: Turla
    id: G0010
    groups: IRON HUNTER, Group 88, Waterbug, WhiteBear, Snake, Krypton, Venomous Bear,
      Secret Blizzard, BELUGASTURGEON
    description: "Turla\_is a cyber espionage threat group that has been attributed\
      \ to Russia's Federal Security Service (FSB). They have compromised victims\
      \ in over 50 countries since at least 2004, spanning a range of industries including\
      \ government, embassies, military, education, research and pharmaceutical companies.\_\
      Turla\_is known for conducting watering hole and spearphishing campaigns, and\
      \ leveraging in-house tools and malware, such as\_Uroburos."
  - name: Water Galura
    id: G1050
    groups: GOLD FEATHER
    description: "Water Galura\_are the operators of the\_Qilin\_Ransomware-as-a-Service\
      \ (RaaS) who handle payload generation, ransom negotiations, and the publication\
      \ of stolen data for\_Qilin\_affilates recruited on Russian cybercrime forums.\_\
      Water Galura\_have been active since at least 2022 and use a double extortion\
      \ model where they demand payment for providing decryption keys and for refraining\
      \ from publishing the stolen data to their leak site."
  - name: Winter Vivern
    id: G1035
    groups: TA473, UAC-0114
    description: Winter Vivern is a group linked to Russian and Belorussian interests
      active since at least 2020 targeting various European government and NGO entities,
      along with sporadic targeting of Indian and US victims. The group leverages
      a combination of document-based phishing activity and server-side exploitation
      for initial access, leveraging adversary-controlled and -created infrastructure
      for follow-on command and control.
  - name: Wizard Spider
    id: G0102
    groups: UNC1878, TEMP.MixMaster, Grim Spider, FIN12, GOLD BLACKBURN, ITG23, Periwinkle
      Tempest, DEV-0193, Pistachio Tempest, DEV-0237
    description: "Wizard Spider\_is a Russia-based financially motivated threat group\
      \ originally known for the creation and deployment of\_TrickBot\_since at least\
      \ 2016.\_Wizard Spider\_possesses a diverse arsenal of tools and has conducted\
      \ ransomware campaigns against a variety of organizations, ranging from major\
      \ corporations to hospitals."
  North Korea:
  - name: Andariel
    id: G0138
    groups: Silent Chollima, PLUTONIUM, Onyx Sleet
    description: "Andariel\_is a North Korean state-sponsored threat group that has\
      \ been active since at least 2009.\_Andariel\_has primarily focused its operations--which\
      \ have included destructive attacks--against South Korean government agencies,\
      \ military organizations, and a variety of domestic companies; they have also\
      \ conducted cyber financial operations against ATMs, banks, and cryptocurrency\
      \ exchanges.\_Andariel's notable activity includes Operation Black Mine, Operation\
      \ GoldenAxe, and Campaign Rifle."
  - name: AppleJeus
    id: G1049
    groups: Gleaming Pisces, Citrine Sleet, UNC1720, UNC4736
    description: "AppleJeus\_is a North Korean state-sponsored threat group attributed\
      \ to the Reconnaissance General Bureau. Associated with the broader\_Lazarus\
      \ Group\_umbrella of actors,\_AppleJeus\_has been active since at least 2018\
      \ and is closely aligned in resources with TEMP.hermit, another DPRK-affiliated\
      \ group under the same umbrella. The group\u2019s primary mission is to generate\
      \ and launder revenue to provide financial support to the government.\_AppleJeus\_\
      primarily targets the cryptocurrency industry and is most notably responsible\
      \ for the\_3CX Supply Chain Attack. The group traditionally deploys malicious\
      \ cryptocurrency software in combination with\_Phishing. From these compromised\
      \ environments, it selectively deploys additional backdoors to enable extended\
      \ operations against high-value financial targets."
  - name: APT38
    id: G0082
    groups: NICKEL GLADSTONE, BeagleBoyz, Bluenoroff, Stardust Chollima, Sapphire
      Sleet, COPERNICIUM
    description: "APT38\_is a North Korean state-sponsored threat group that specializes\
      \ in financial cyber operations; it has been attributed to the Reconnaissance\
      \ General Bureau. Active since at least 2014,\_APT38\_has targeted banks, financial\
      \ institutions, casinos, cryptocurrency exchanges, SWIFT system endpoints, and\
      \ ATMs in at least 38 countries worldwide. Significant operations include the\
      \ 2016 Bank of Bangladesh heist, during which\_APT38\_stole $81 million, as\
      \ well as attacks against Bancomext and Banco de Chile ; some of their attacks\
      \ have been destructive."
  - name: Contagious Interview
    id: G1052
    groups: DeceptiveDevelopment, Gwisin Gang, Tenacious Pungsan, DEV#POPPER, PurpleBravo,
      TAG-121
    description: "Contagious Interview\_is a North Korea\u2013aligned threat group\
      \ active since 2023. The group conducts both cyberespionage and financially\
      \ motivated operations, including the theft of cryptocurrency and user credentials.\_\
      Contagious Interview\_targets Windows, Linux, and macOS systems, with a particular\
      \ focus on individuals engaged in software development and cryptocurrency-related\
      \ activities."
  - name: Lazarus Group
    id: G0032
    groups: Labyrinth Chollima, HIDDEN COBRA, Guardians of Peace, ZINC, NICKEL ACADEMY,
      Diamond Sleet
    description: "Lazarus Group\_is a North Korean state-sponsored cyber threat group\
      \ attributed to the Reconnaissance General Bureau (RGB).\_Lazarus Group\_has\
      \ been active since at least 2009 and is reportedly responsible for the November\
      \ 2014 destructive wiper attack on Sony Pictures Entertainment, identified by\
      \ Novetta as part of Operation Blockbuster. Malware used by\_Lazarus Group\_\
      correlates to other reported campaigns, including Operation Flame, Operation\
      \ 1Mission, Operation Troy, DarkSeoul, and Ten Days of Rain."
  - name: Moonstone Sleet
    id: G1036
    groups: Storm-1789
    description: "Moonstone Sleet\_is a North Korean-linked threat actor executing\
      \ both financially motivated attacks and espionage operations. The group previously\
      \ overlapped significantly with another North Korean-linked entity,\_Lazarus\
      \ Group, but has differentiated its tradecraft since 2023.\_Moonstone Sleet\_\
      is notable for creating fake companies and personas to interact with victim\
      \ entities, as well as developing unique malware such as a variant delivered\
      \ via a fully functioning game."
  Other:
  - name: APT-C-23
    id: G1028
    groups: Mantis, Arid Viper, Desert Falcon, TAG-63, Grey Karkadann, Big Bang APT,
      Two-tailed Scorpion
    description: "APT-C-23\_is a threat group that has been active since at least\
      \ 2014.\_APT-C-23\_has primarily focused its operations on the Middle East,\
      \ including Israeli military assets.\_APT-C-23\_has developed mobile spyware\
      \ targeting Android and iOS devices since 2017."
  - name: APT18
    id: G0026
    groups: TG-0416, Dynamite Panda, Threat Group-0416
    description: "APT18\_is a threat group that has operated since at least 2009 and\
      \ has targeted a range of industries, including technology, manufacturing, human\
      \ rights groups, government, and medical."
  - name: BackdoorDiplomacy
    id: G0135
    groups: nan
    description: "BackdoorDiplomacy\_is a cyber espionage threat group that has been\
      \ active since at least 2017.\_BackdoorDiplomacy\_has targeted Ministries of\
      \ Foreign Affairs and telecommunication companies in Africa, Europe, the Middle\
      \ East, and Asia."
  - name: BlackOasis
    id: G0063
    groups: nan
    description: "BlackOasis\_is a Middle Eastern threat group that is believed to\
      \ be a customer of Gamma Group. The group has shown interest in prominent figures\
      \ in the United Nations, as well as opposition bloggers, activists, regional\
      \ news correspondents, and think tanks. A group known by Microsoft as\_NEODYMIUM\_\
      is reportedly associated closely with\_BlackOasis\_operations, but evidence\
      \ that the group names are aliases has not been identified."
  - name: Blue Mockingbird
    id: G0108
    groups: nan
    description: "Blue Mockingbird\_is a cluster of observed activity involving Monero\
      \ cryptocurrency-mining payloads in dynamic-link library (DLL) form on Windows\
      \ systems. The earliest observed Blue Mockingbird tools were created in December\
      \ 2019."
  - name: Bouncing Golf
    id: G0097
    groups: nan
    description: "Bouncing Golf\_is a cyberespionage campaign targeting Middle Eastern\
      \ countries."
  - name: Carbanak
    id: G0008
    groups: Anunak
    description: "Carbanak\_is a cybercriminal group that has used\_Carbanak\_malware\
      \ to target financial institutions since at least 2013.\_Carbanak\_may be linked\
      \ to groups tracked separately as\_Cobalt Group\_and\_FIN7\_that have also used\_\
      Carbanak\_malware."
  - name: Confucius
    id: G0142
    groups: Confucius APT
    description: "Confucius\_is a cyber espionage group that has primarily targeted\
      \ military personnel, high-profile personalities, business persons, and government\
      \ organizations in South Asia since at least 2013. Security researchers have\
      \ noted similarities between\_Confucius\_and\_Patchwork, particularly in their\
      \ respective custom malware code and targets."
  - name: Dark Caracal
    id: G0070
    groups: nan
    description: "Dark Caracal\_is threat group that has been attributed to the Lebanese\
      \ General Directorate of General Security (GDGS) and has operated since at least\
      \ 2012."
  - name: Darkhotel
    id: G0012
    groups: DUBNIUM, Zigzag Hail
    description: "Darkhotel\_is a suspected South Korean threat group that has targeted\
      \ victims primarily in East Asia since at least 2004. The group's name is based\
      \ on cyber espionage operations conducted via hotel Internet networks against\
      \ traveling executives and other select guests.\_Darkhotel\_has also conducted\
      \ spearphishing campaigns and infected victims through peer-to-peer and file\
      \ sharing networks."
  - name: DarkHydrus
    id: G0079
    groups: nan
    description: "DarkHydrus\_is a threat group that has targeted government agencies\
      \ and educational institutions in the Middle East since at least 2016. The group\
      \ heavily leverages open-source tools and custom payloads for carrying out attacks."
  - name: DragonOK
    id: G0017
    groups: nan
    description: "DragonOK\_is a threat group that has targeted Japanese organizations\
      \ with phishing emails. Due to overlapping TTPs, including similar custom tools,\_\
      DragonOK\_is thought to have a direct or indirect relationship with the threat\
      \ group\_Moafee. It is known to use a variety of malware, including Sysget/HelloBridge,\
      \ PlugX, PoisonIvy, FormerFirstRat, NFlog, and NewCT."
  - name: Equation
    id: G0020
    groups: nan
    description: "Equation\_is a sophisticated threat group that employs multiple\
      \ remote access tools. The group is known to use zero-day exploits and has developed\
      \ the capability to overwrite the firmware of hard disk drives."
  - name: FIN4
    id: G0085
    groups: nan
    description: "FIN4\_is a financially-motivated threat group that has targeted\
      \ confidential information related to the public financial market, particularly\
      \ regarding healthcare and pharmaceutical companies, since at least 2013.\_\
      FIN4\_is unique in that they do not infect victims with typical persistent malware,\
      \ but rather they focus on capturing credentials authorized to access email\
      \ and other non-public correspondence."
  - name: FIN6
    id: G0037
    groups: Magecart Group 6, ITG08, Skeleton Spider, TAAL, Camouflage Tempest
    description: "FIN6\_is a cyber crime group that has stolen payment card data and\
      \ sold it for profit on underground marketplaces. This group has aggressively\
      \ targeted and compromised point of sale (PoS) systems in the hospitality and\
      \ retail sectors."
  - name: Gallmaker
    id: G0084
    groups: nan
    description: "Gallmaker\_is a cyberespionage group that has targeted victims in\
      \ the Middle East and has been active since at least December 2017. The group\
      \ has mainly targeted victims in the defense, military, and government sectors."
  - name: GCMAN
    id: G0036
    groups: nan
    description: "GCMAN\_is a threat group that focuses on targeting banks for the\
      \ purpose of transferring money to e-currency services."
  - name: HEXANE
    id: G1001
    groups: Lyceum, Siamesekitten, Spirlin
    description: "HEXANE\_is a cyber espionage threat group that has targeted oil\
      \ & gas, telecommunications, aviation, and internet service provider organizations\
      \ since at least 2017. Targeted companies have been located in the Middle East\
      \ and Africa, including Israel, Saudi Arabia, Kuwait, Morocco, and Tunisia.\_\
      HEXANE's TTPs appear similar to\_APT33\_and\_OilRig\_but due to differences\
      \ in victims and tools it is tracked as a separate entity."
  - name: LazyScripter
    id: G0140
    groups: nan
    description: "LazyScripter\_is threat group that has mainly targeted the airlines\
      \ industry since at least 2018, primarily using open-source toolsets."
  - name: Lotus Blossom
    id: G0030
    groups: DRAGONFISH, Spring Dragon, RADIUM, Raspberry Typhoon, Bilbug, Thrip
    description: "Lotus Blossom\_is a long-standing threat group largely targeting\
      \ various entities in Asia since at least 2009. In addition to government and\
      \ related targets,\_Lotus Blossom\_has also targeted entities such as digital\
      \ certificate issuers."
  - name: Metador
    id: G1013
    groups: nan
    description: "Metador\_is a suspected cyber espionage group that was first reported\
      \ in September 2022.\_Metador\_has targeted a limited number of telecommunication\
      \ companies, internet service providers, and universities in the Middle East\
      \ and Africa. Security researchers named the group\_Metador\_based on the \"\
      I am meta\" string in one of the group's malware samples and the expectation\
      \ of Spanish-language responses from C2 servers."
  - name: Molerats
    id: G0021
    groups: Operation Molerats, Gaza Cybergang
    description: "Molerats\_is an Arabic-speaking, politically-motivated threat group\
      \ that has been operating since 2012. The group's victims have primarily been\
      \ in the Middle East, Europe, and the United States."
  - name: MoustachedBouncer
    id: G1019
    groups: nan
    description: "MoustachedBouncer\_is a cyberespionage group that has been active\
      \ since at least 2014 targeting foreign embassies in Belarus."
  - name: Mustard Tempest
    id: G1020
    groups: DEV-0206, TA569, GOLD PRELUDE, UNC1543
    description: "Mustard Tempest\_is an initial access broker that has operated the\_\
      SocGholish\_distribution network since at least 2017.\_Mustard Tempest\_has\
      \ partnered with\_Indrik Spider\_to provide access for the download of additional\
      \ malware including LockBit,\_WastedLocker, and remote access tools."
  - name: Orangeworm
    id: G0071
    groups: nan
    description: "Orangeworm\_is a group that has targeted organizations in the healthcare\
      \ sector in the United States, Europe, and Asia since at least 2015, likely\
      \ for the purpose of corporate espionage. Reverse engineering of\_Kwampirs,\
      \ directly associated with\_Orangeworm\_activity, indicates significant functional\
      \ and development overlaps with\_Shamoon."
  - name: PLATINUM
    id: G0068
    groups: nan
    description: "PLATINUM\_is an activity group that has targeted victims since at\
      \ least 2009. The group has focused on targets associated with governments and\
      \ related organizations in South and Southeast Asia."
  - name: Poseidon Group
    id: G0033
    groups: nan
    description: "Poseidon Group\_is a Portuguese-speaking threat group that has been\
      \ active since at least 2005. The group has a history of using information exfiltrated\
      \ from victims to blackmail victim companies into contracting the\_Poseidon\
      \ Group\_as a security firm."
  - name: Rancor
    id: G0075
    groups: nan
    description: "Rancor\_is a threat group that has led targeted campaigns against\
      \ the South East Asia region.\_Rancor\_uses politically-motivated lures to entice\
      \ victims to open malicious documents."
  - name: Scattered Spider
    id: G1015
    groups: Roasted 0ktapus, Octo Tempest, Storm-0875, UNC3944
    description: "Scattered Spider\_is a native English-speaking cybercriminal group\
      \ active since at least 2022. The group initially targeted customer relationship\
      \ management (CRM) providers, business process outsourcing (BPO) firms, and\
      \ telecommunications and technology companies before expanding in 2023 to gaming,\
      \ hospitality, retail, managed service provider (MSP), manufacturing, and financial\
      \ sectors."
  - name: Sea Turtle
    id: G1041
    groups: Teal Kurma, Marbled Dust, Cosmic Wolf, SILICON
    description: "Sea Turtle\_is a T\xFCrkiye-linked threat actor active since at\
      \ least 2017 performing espionage and service provider compromise operations\
      \ against victims in Asia, Europe, and North America.\_Sea Turtle\_is notable\
      \ for targeting registrars managing ccTLDs and complex DNS-based intrusions\
      \ where the threat actor compromised DNS providers to hijack DNS resolution\
      \ for ultimate victims, enabling\_Sea Turtle\_to spoof log in portals and other\
      \ applications for credential collection."
  - name: SilverTerrier
    id: G0083
    groups: nan
    description: "SilverTerrier\_is a Nigerian threat group that has been seen active\
      \ since 2014.\_SilverTerrier\_mainly targets organizations in high technology,\
      \ higher education, and manufacturing."
  - name: Sowbug
    id: G0054
    groups: nan
    description: "Sowbug\_is a threat group that has conducted targeted attacks against\
      \ organizations in South America and Southeast Asia, particularly government\
      \ entities, since at least 2015."
  - name: Stealth Falcon
    id: G0038
    groups: nan
    description: "Stealth Falcon\_is a threat group that has conducted targeted spyware\
      \ attacks against Emirati journalists, activists, and dissidents since at least\
      \ 2012. Circumstantial evidence suggests there could be a link between this\
      \ group and the United Arab Emirates (UAE) government, but that has not been\
      \ confirmed."
  - name: TA2541
    id: G1018
    groups: nan
    description: "TA2541\_is a cybercriminal group that has been targeting the aviation,\
      \ aerospace, transportation, manufacturing, and defense industries since at\
      \ least 2017.\_TA2541\_campaigns are typically high volume and involve the use\
      \ of commodity remote access tools obfuscated by crypters and themes related\
      \ to aviation, transportation, and travel."
  - name: TA551
    id: G0127
    groups: GOLD CABIN, Shathak
    description: "TA551\_is a financially-motivated threat group that has been active\
      \ since at least 2018. The group has primarily targeted English, German, Italian,\
      \ and Japanese speakers through email-based malware distribution campaigns."
  - name: TA577
    id: G1037
    groups: nan
    description: "TA577\_is an initial access broker (IAB) that has distributed\_\
      QakBot\_and\_Pikabot, and was among the first observed groups distributing\_\
      Latrodectus\_in 2023."
  - name: TA578
    id: G1038
    groups: nan
    description: "TA578\_is a threat actor that has used contact forms and email to\
      \ initiate communications with victims and to distribute malware including\_\
      Latrodectus,\_IcedID, and\_Bumblebee."
  - name: TeamTNT
    id: G0139
    groups: nan
    description: "TeamTNT\_is a threat group that has primarily targeted cloud and\
      \ containerized environments. The group as been active since at least October\
      \ 2019 and has mainly focused its efforts on leveraging cloud and container\
      \ resources to deploy cryptocurrency miners in victim environments."
  - name: Threat Group-1314
    id: G0028
    groups: TG-1314
    description: "Threat Group-1314\_is an unattributed threat group that has used\
      \ compromised credentials to log into a victim's remote access infrastructure."
  - name: Thrip
    id: G0076
    groups: nan
    description: "Thrip\_is an espionage group that has targeted satellite communications,\
      \ telecoms, and defense contractor companies in the U.S. and Southeast Asia.\
      \ The group uses custom malware as well as \"living off the land\" techniques."
  - name: ToddyCat
    id: G1022
    groups: nan
    description: "ToddyCat\_is a sophisticated threat group that has been active since\
      \ at least 2020 using custom loaders and malware in multi-stage infection chains\
      \ against government and military targets across Europe and Asia."
  - name: Tropic Trooper
    id: G0081
    groups: Pirate Panda, KeyBoy
    description: "Tropic Trooper\_is an unaffiliated threat group that has led targeted\
      \ campaigns against targets in Taiwan, the Philippines, and Hong Kong.\_Tropic\
      \ Trooper\_focuses on targeting government, healthcare, transportation, and\
      \ high-tech industries and has been active since 2011."
  - name: Velvet Ant
    id: G1047
    groups: nan
    description: "Velvet Ant\_is a threat actor operating since at least 2021.\_Velvet\
      \ Ant\_is associated with complex persistence mechanisms, the targeting of network\
      \ devices and appliances during operations, and the use of zero day exploits."
  - name: Volatile Cedar
    id: G0123
    groups: Lebanese Cedar
    description: "Volatile Cedar\_is a Lebanese threat group that has targeted individuals,\
      \ companies, and institutions worldwide.\_Volatile Cedar\_has been operating\
      \ since 2012 and is motivated by political and ideological interests."
  - name: Whitefly
    id: G0107
    groups: nan
    description: "Whitefly\_is a cyber espionage group that has been operating since\
      \ at least 2017. The group has targeted organizations based mostly in Singapore\
      \ across a wide variety of sectors, and is primarily interested in stealing\
      \ large amounts of sensitive information. The group has been linked to an attack\
      \ against Singapore\u2019s largest public health organization, SingHealth."
  - name: Windigo
    id: G0124
    groups: nan
    description: "The\_Windigo\_group has been operating since at least 2011, compromising\
      \ thousands of Linux and Unix servers using the\_Ebury\_SSH backdoor to create\
      \ a spam botnet. Despite law enforcement intervention against the creators,\_\
      Windigo\_operators continued updating\_Ebury\_through 2019."
  - name: Windshift
    id: G0112
    groups: Bahamut
    description: "Windshift\_is a threat group that has been active since at least\
      \ 2017, targeting specific individuals for surveillance in government departments\
      \ and critical infrastructure across the Middle East."
  - name: WIRTE
    id: G0090
    groups: Ashen Lepus
    description: "WIRTE\_is a cyberespionage actor, believed to be a subgroup of the\
      \ Hamas-affiliated Gaza Cybergang, that has been active since at least August\
      \ 2018.\_WIRTE\_has targeted diplomatic, financial, military, legal, and technology\
      \ organizations across the Middle East, North Africa, and in Europe to gather\
      \ intelligence.\_WIRTE\_has remained persistently active despite the ongoing\
      \ Israel-Hamas conflict and has expanded their operations to include wiper malware\
      \ attacks against Israeli targets."
  - name: TA577
    id: G1037
    groups: nan
    description: "TA577\_is an initial access broker (IAB) that has distributed\_\
      QakBot\_and\_Pikabot, and was among the first observed groups distributing\_\
      Latrodectus\_in 2023."
  - name: TA578
    id: G1038
    groups: nan
    description: "TA578\_is a threat actor that has used contact forms and email to\
      \ initiate communications with victims and to distribute malware including\_\
      Latrodectus,\_IcedID, and\_Bumblebee."
  - name: TeamTNT
    id: G0139
    groups: nan
    description: "TeamTNT\_is a threat group that has primarily targeted cloud and\
      \ containerized environments. The group as been active since at least October\
      \ 2019 and has mainly focused its efforts on leveraging cloud and container\
      \ resources to deploy cryptocurrency miners in victim environments."
  - name: Threat Group-1314
    id: G0028
    groups: TG-1314
    description: "Threat Group-1314\_is an unattributed threat group that has used\
      \ compromised credentials to log into a victim's remote access infrastructure."
  - name: Thrip
    id: G0076
    groups: nan
    description: "Thrip\_is an espionage group that has targeted satellite communications,\
      \ telecoms, and defense contractor companies in the U.S. and Southeast Asia.\
      \ The group uses custom malware as well as \"living off the land\" techniques."
  - name: ToddyCat
    id: G1022
    groups: nan
    description: "ToddyCat\_is a sophisticated threat group that has been active since\
      \ at least 2020 using custom loaders and malware in multi-stage infection chains\
      \ against government and military targets across Europe and Asia."
  - name: Tropic Trooper
    id: G0081
    groups: Pirate Panda, KeyBoy
    description: "Tropic Trooper\_is an unaffiliated threat group that has led targeted\
      \ campaigns against targets in Taiwan, the Philippines, and Hong Kong.\_Tropic\
      \ Trooper\_focuses on targeting government, healthcare, transportation, and\
      \ high-tech industries and has been active since 2011."
  - name: Velvet Ant
    id: G1047
    groups: nan
    description: "Velvet Ant\_is a threat actor operating since at least 2021.\_Velvet\
      \ Ant\_is associated with complex persistence mechanisms, the targeting of network\
      \ devices and appliances during operations, and the use of zero day exploits."
  - name: Volatile Cedar
    id: G0123
    groups: Lebanese Cedar
    description: "Volatile Cedar\_is a Lebanese threat group that has targeted individuals,\
      \ companies, and institutions worldwide.\_Volatile Cedar\_has been operating\
      \ since 2012 and is motivated by political and ideological interests."
  - name: nan
    id: nan
    groups: nan
    description: nan
  - name: nan
    id: nan
    groups: nan
    description: "Reporting indicates a separate initial access cluster, SYLVANITE,\
      \ has been observed exploiting internet-facing edge devices and transferring\
      \ access to\_Volt Typhoon, also tracked as VOLTZITE, for follow-on operations."
  - name: Whitefly
    id: G0107
    groups: nan
    description: "Whitefly\_is a cyber espionage group that has been operating since\
      \ at least 2017. The group has targeted organizations based mostly in Singapore\
      \ across a wide variety of sectors, and is primarily interested in stealing\
      \ large amounts of sensitive information. The group has been linked to an attack\
      \ against Singapore\u2019s largest public health organization, SingHealth."
  - name: Windigo
    id: G0124
    groups: nan
    description: "The\_Windigo\_group has been operating since at least 2011, compromising\
      \ thousands of Linux and Unix servers using the\_Ebury\_SSH backdoor to create\
      \ a spam botnet. Despite law enforcement intervention against the creators,\_\
      Windigo\_operators continued updating\_Ebury\_through 2019."
  - name: Windshift
    id: G0112
    groups: Bahamut
    description: "Windshift\_is a threat group that has been active since at least\
      \ 2017, targeting specific individuals for surveillance in government departments\
      \ and critical infrastructure across the Middle East."
  - name: WIRTE
    id: G0090
    groups: Ashen Lepus
    description: "WIRTE\_is a cyberespionage actor, believed to be a subgroup of the\
      \ Hamas-affiliated Gaza Cybergang, that has been active since at least August\
      \ 2018.\_WIRTE\_has targeted diplomatic, financial, military, legal, and technology\
      \ organizations across the Middle East, North Africa, and in Europe to gather\
      \ intelligence.\_WIRTE\_has remained persistently active despite the ongoing\
      \ Israel-Hamas conflict and has expanded their operations to include wiper malware\
      \ attacks against Israeli targets."
  Vietnam:
  - name: APT32
    id: G0050
    groups: SeaLotus, OceanLotus, APT-C-00, Canvas Cyclone, BISMUTH
    description: "APT32\_is a suspected Vietnam-based threat group that has been active\
      \ since at least 2014. The group has targeted multiple private sector industries\
      \ as well as foreign governments, dissidents, and journalists with a strong\
      \ focus on Southeast Asian countries like Vietnam, the Philippines, Laos, and\
      \ Cambodia. They have extensively used strategic web compromises to compromise\
      \ victims."
  Turkey:
  - name: NEODYMIUM
    id: G0055
    groups: nan
    description: "NEODYMIUM\_is an activity group that conducted a campaign in May\
      \ 2016 and has heavily targeted Turkish victims. The group has demonstrated\
      \ similarity to another activity group called\_PROMETHIUM\_due to overlapping\
      \ victim and campaign characteristics.\_NEODYMIUM\_is reportedly associated\
      \ closely with\_BlackOasis\_operations, but evidence that the group names are\
      \ aliases has not been identified."
  - name: PROMETHIUM
    id: G0056
    groups: StrongPity
    description: "PROMETHIUM\_is an activity group focused on espionage that has been\
      \ active since at least 2012. The group has conducted operations globally with\
      \ a heavy emphasis on Turkish targets.\_PROMETHIUM\_has demonstrated similarity\
      \ to another activity group called\_NEODYMIUM\_due to overlapping victim and\
      \ campaign characteristics."
  India:
  - name: Patchwork
    id: G0040
    groups: Hangover Group, Dropping Elephant, Chinastrats, MONSOON, Operation Hangover
    description: "Patchwork\_is a cyber espionage group that was first observed in\
      \ December 2015. While the group has not been definitively attributed, circumstantial\
      \ evidence suggests the group may be a pro-Indian or Indian entity.\_Patchwork\_\
      has been seen targeting industries related to diplomatic and government agencies.\
      \ Much of the code used by this group was copied and pasted from online forums.\_\
      Patchwork\_was also seen operating spearphishing campaigns targeting U.S. think\
      \ tank groups in March and April of 2018."
  Pakistan:
  - name: SideCopy
    id: G1008
    groups: nan
    description: "SideCopy\_is a Pakistani threat group that has primarily targeted\
      \ South Asian countries, including Indian and Afghani government personnel,\
      \ since at least 2019.\_SideCopy's name comes from its infection chain that\
