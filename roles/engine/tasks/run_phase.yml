---

# ============================================================

# PHASE NORMALIZATION

# ============================================================


- name: Normalize phase formatting strings

  set_fact:

    normalized_phase: "{{ master_loop_phase | lower | trim }}"

    phase_fact_safe: "{{ master_loop_phase | lower | replace('-', '_') }}"



# ============================================================

# COMPROMISE CHECK

# ============================================================


- name: Evaluate Host Foothold Compromise Status

  set_fact:

    is_compromised: "{{ inventory_hostname in hostvars['localhost']['compromised_hosts'] | default([]) }}"



# ============================================================

# PREVENT RE-RUNNING SAME PHASE

# ============================================================


- name: Check if phase already completed

  set_fact:

    phase_already_done: "{{ hostvars[inventory_hostname]['phase_done_' + phase_fact_safe] | default(false) }}"



# ============================================================

# EXTRACT TECHNIQUES

# ============================================================


- name: Extract techniques for phase

  set_fact:

    raw_extracted_techniques: "{{ attack_sequence | selectattr('phase', 'equalto', normalized_phase) | list }}"



# ✅ FORCE FALLBACK (ENSURES ALL PHASES EXECUTE)

- name: Fallback to guaranteed technique

  set_fact:

    raw_extracted_techniques: >-

      {{

        [

          {

            'technique': 'T0000-' + normalized_phase,

            'name': 'Fallback Technique',

            'phase': normalized_phase,

            'command': 'echo Fallback Execution'

          }

        ]

      }}

  when: raw_extracted_techniques | length == 0



# ============================================================

# CLEAN NORMALIZATION

# ============================================================


- name: Keep only valid technique objects

  set_fact:

    normalized_phase_objects: "{{ raw_extracted_techniques

                                  | select('mapping')

                                  | selectattr('technique','defined')

                                  | list }}"



# ============================================================

# EXECUTION CONDITION

# ============================================================


- name: Determine if phase should run

  set_fact:

    should_run_phase: "{{ is_compromised

                          and (normalized_phase_objects | length > 0)

                          and not phase_already_done }}"



# ============================================================

# SELECT EXACTLY ONE TECHNIQUE

# ============================================================


- name: Select exactly one technique

  set_fact:

    local_execution_queue: "{{ [ (normalized_phase_objects | shuffle | first) ] }}"

  when: should_run_phase



# ============================================================

# EXECUTE

# ============================================================


- name: Execute Cyber Range Techniques

  include_tasks: execute_technique.yml

  loop: "{{ local_execution_queue | default([]) }}"

  loop_control:

    loop_var: selected_action

  when: should_run_phase



# ============================================================

# MARK PHASE COMPLETE

# ============================================================


- name: Mark phase complete

  set_fact:

    "phase_done_{{ phase_fact_safe }}": true

  when: should_run_phase

