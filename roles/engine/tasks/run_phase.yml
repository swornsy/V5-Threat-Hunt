---

# ================================================================

# CYBER RANGE ENGINE - STATE + HOST-LIMIT RUN PHASE HANDLER

# ================================================================


# ---------------------------------------------------------------

# Normalize phase

# ---------------------------------------------------------------


- name: Normalize phase

  set_fact:

    normalized_phase: "{{ master_loop_phase | string | trim | lower }}"



# ---------------------------------------------------------------

# INITIALIZE COMPROMISED HOST TRACKING (GLOBAL)

# ---------------------------------------------------------------


- name: Initialize compromised hosts list

  set_fact:

    compromised_hosts: []

  delegate_to: localhost

  run_once: true

  when: hostvars['localhost']['compromised_hosts'] is not defined



# ---------------------------------------------------------------

# INITIALIZE STATE PER HOST

# ---------------------------------------------------------------


- name: Initialize attack state

  set_fact:

    has_access: false

    is_privileged: false

    has_lateral: false

  when: has_access is not defined



# ---------------------------------------------------------------

# STATE ENFORCEMENT + HOST LIMIT LOGIC

# ---------------------------------------------------------------


- name: Enforce attack state rules

  set_fact:

    phase_allowed: >-

      {{

        (normalized_phase == 'initial_access')

        or

        (normalized_phase in ['execution','persistence'] and has_access)

        or

        (normalized_phase == 'privilege_escalation' and has_access)

        or (

          normalized_phase == 'lateral_movement'

          and is_privileged

          and (hostvars['localhost']['compromised_hosts'] | length < 3)

        )

        or (normalized_phase == 'c2' and has_lateral)

        or (normalized_phase == 'exfiltration' and has_lateral)

      }}



# ---------------------------------------------------------------

# DEBUG STATE (optional but very useful)

# ---------------------------------------------------------------


- name: DEBUG state enforcement

  debug:

    msg: >

      Host={{ inventory_hostname }}

      Phase={{ normalized_phase }}

      Allowed={{ phase_allowed }}

      has_access={{ has_access }}

      is_privileged={{ is_privileged }}

      has_lateral={{ has_lateral }}

      CompromisedHosts={{ hostvars['localhost']['compromised_hosts'] }}



# ---------------------------------------------------------------

# SKIP IF NOT ALLOWED

# ---------------------------------------------------------------


- name: Skip phase if not allowed

  meta: end_host

  when: not phase_allowed



# ---------------------------------------------------------------

# BUILD TECHNIQUES

# ---------------------------------------------------------------


- name: Build phase-specific technique list

  set_fact:

    phase_techniques: "{{ attack_sequence | selectattr('phase', 'equalto', normalized_phase) | list | default([]) }}"



# ---------------------------------------------------------------

# REMOVE USED TECHNIQUES

# ---------------------------------------------------------------


- name: Filter already used techniques

  set_fact:

    phase_techniques: "{{ phase_techniques | rejectattr('technique', 'in', used_techniques | default([])) | list }}"



# ---------------------------------------------------------------

# DETERMINE COUNT

# ---------------------------------------------------------------


- name: Determine number of techniques

  set_fact:

    selected_count: "{{ (1 if attack_behaviour == 'stealthy' else (range(1,3) | random)) }}"



# ---------------------------------------------------------------

# SELECT TECHNIQUES

# ---------------------------------------------------------------


- name: Select techniques

  set_fact:

    selected_phase_techniques: "{{ (phase_techniques | shuffle)[0:(selected_count | int)] }}"

  when: phase_techniques | length > 0



# ---------------------------------------------------------------

# EXECUTE ONLY IF HOST COMPROMISED OR INITIAL ACCESS

# ---------------------------------------------------------------


- name: Execute Cyber Range Techniques

  include_tasks: execute_technique.yml

  vars:

    selected_action: "{{ technique }}"

    current_phase: "{{ normalized_phase }}"

  loop: "{{ selected_phase_techniques | default([]) }}"

  loop_control:

    loop_var: technique

  when:

    - selected_phase_techniques | default([]) | length > 0

    - (

        normalized_phase == 'initial_access'

        or inventory_hostname in hostvars['localhost']['compromised_hosts']

      )



# ---------------------------------------------------------------

# REGISTER INITIAL ACCESS HOST

# ---------------------------------------------------------------


- name: Register initial access host

  set_fact:

    compromised_hosts: "{{ (hostvars['localhost']['compromised_hosts'] + [ inventory_hostname ]) | unique }}"

  delegate_to: localhost

  when:

    - normalized_phase == 'initial_access'



# ---------------------------------------------------------------

# ADD HOST DURING LATERAL (LIMIT TO 3 TOTAL)

# ---------------------------------------------------------------


- name: Add host via lateral movement

  set_fact:

    compromised_hosts: "{{ (hostvars['localhost']['compromised_hosts'] + [ inventory_hostname ]) | unique }}"

  delegate_to: localhost

  when:

    - normalized_phase == 'lateral_movement'

    - inventory_hostname not in hostvars['localhost']['compromised_hosts']

    - (hostvars['localhost']['compromised_hosts'] | length) < 3



# ---------------------------------------------------------------

# UPDATE STATE

# ---------------------------------------------------------------


- name: Update attack state

  set_fact:

    has_access: "{{ true if normalized_phase == 'initial_access' else has_access }}"

    is_privileged: "{{ true if normalized_phase == 'privilege_escalation' else is_privileged }}"

    has_lateral: "{{ true if normalized_phase == 'lateral_movement' else has_lateral }}"
