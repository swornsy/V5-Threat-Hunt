---

# ================================================================

# CYBER RANGE ENGINE - RUN PHASE HANDLER (ULTIMATE STABLE BUILD)

# ================================================================


# ---------------------------------------------------------------

# HARD GUARD: Prevent phase from running more than once per host

# ---------------------------------------------------------------


- name: Skip phase if already executed on this host

  meta: end_host

  when: hostvars[inventory_hostname]["phase_done_" + master_loop_phase] is defined



# ---------------------------------------------------------------

# Normalize phase

# ---------------------------------------------------------------


- name: Normalize phase

  set_fact:

    normalized_phase: "{{ master_loop_phase | string | trim | lower }}"

  tags: engine



- name: DEBUG normalized phase

  debug:

    msg: "Phase={{ normalized_phase }}"

  tags: engine



# ---------------------------------------------------------------

# Evaluate compromise state

# ---------------------------------------------------------------


- name: Evaluate Host Foothold Compromise Status

  set_fact:

    is_compromised: "{{ inventory_hostname in (hostvars['localhost']['compromised_hosts'] | default([])) or (inventory_hostname | split('.') | first) in (hostvars['localhost']['compromised_hosts'] | default([])) }}"

  tags: engine



# ---------------------------------------------------------------

# Build phase-specific techniques

# ---------------------------------------------------------------


- name: Build phase-specific technique list

  set_fact:

    phase_techniques: "{{ attack_sequence | selectattr('phase', 'equalto', normalized_phase) | list | default([]) }}"

  tags: engine



# ---------------------------------------------------------------

# Remove already-used techniques

# ---------------------------------------------------------------


- name: Filter already used techniques

  set_fact:

    phase_techniques: "{{ phase_techniques | rejectattr('technique', 'in', used_techniques | default([])) | list }}"

  tags: engine



# ---------------------------------------------------------------

# Build fallback global pool

# ---------------------------------------------------------------


- name: Build global technique pool

  set_fact:

    global_techniques: "{{ attack_sequence | rejectattr('technique', 'in', used_techniques | default([])) | list }}"

  tags: engine



# ---------------------------------------------------------------

# Determine behaviour-driven count

# ---------------------------------------------------------------


- name: Determine number of techniques

  set_fact:

    selected_count: "{{ (1 if attack_behaviour == 'stealthy' else (range(1,3) | random)) }}"

  tags: engine



# ---------------------------------------------------------------

# Select techniques (ONCE per phase)

# ---------------------------------------------------------------


- name: Select techniques for execution

  set_fact:

    selected_phase_techniques: "{{ (((phase_techniques if (phase_techniques | length > 0) else global_techniques) | shuffle)[0:(selected_count | int)]) }}"

    "selection_done_{{ normalized_phase }}": true

  when: hostvars[inventory_hostname]['selection_done_' + normalized_phase] is not defined

  tags: engine



# ---------------------------------------------------------------

# DEBUG selection

# ---------------------------------------------------------------


- name: DEBUG selection logic

  debug:

    msg: >-

      Phase={{ normalized_phase }}

      Host={{ inventory_hostname }}

      PhaseTechniques={{ phase_techniques | length }}

      FallbackPool={{ global_techniques | length }}

      SelectedCount={{ selected_count }}

      SelectedActual={{ selected_phase_techniques | length }}

  tags: engine



# ---------------------------------------------------------------

# Execute techniques (safe, no duplicates)

# ---------------------------------------------------------------


- name: Execute Cyber Range Techniques

  include_tasks: execute_technique.yml

  vars:

    selected_action: "{{ technique }}"

    current_phase: "{{ normalized_phase }}"

  loop: "{{ selected_phase_techniques | unique(attribute='technique') }}"

  loop_control:

    loop_var: technique

  when:

    - selected_phase_techniques | length > 0

    - is_compromised | bool

  tags: engine



# ---------------------------------------------------------------

# Mark phase as completed (CRITICAL FINAL FIX)

# ---------------------------------------------------------------


- name: Mark phase as completed

  set_fact:

    "phase_done_{{ normalized_phase }}": true

  tags: engine



# ---------------------------------------------------------------

# Add dwell time (realistic timing)

# ---------------------------------------------------------------


- name: Simulate dwell time between actions

  delegate_to: localhost

  pause:

    seconds: "{{ range(1,4) | random }}"

  tags: engine
