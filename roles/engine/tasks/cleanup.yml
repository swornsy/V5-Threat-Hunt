---

# ========================================================================

# CYBER RANGE HYGIENE SYSTEM - SELF-DESTRUCT ENGINE (cleanup.yml)

# ========================================================================


- name: Establish Platform Mapping Elements

  set_fact:

    is_windows: "{{ ansible_os_family == 'Windows' }}"

  tags: always


- name: "[WINDOWS] Check if RangeEngine Directory Exists"

  win_stat:

    path: C:\ProgramData\RangeEngine

  register: win_range_dir

  when: is_windows | bool

  tags: always


- name: "[WINDOWS] Issue Poison-Pill Worker Self-Destruct State"

  win_copy:

    content: "terminate"

    dest: C:\ProgramData\RangeEngine\worker.status

  when: is_windows | bool and win_range_dir.stat.exists | bool

  tags: always


- name: "[LINUX] Check if RangeEngine Directory Exists"

  stat:

    path: /tmp/.range_engine

  register: linux_range_dir

  when: not (is_windows | bool)

  tags: always


- name: "[LINUX] Issue Poison-Pill Worker Self-Destruct State"

  copy:

    content: "terminate"

    dest: /tmp/.range_engine/worker.status

  when: not (is_windows | bool) and linux_range_dir.stat.exists | bool

  tags: always


- name: Enforce Small Sync Window for Worker Cleanup Sequences

  pause:

    seconds: 4

  run_once: true

  tags: always
