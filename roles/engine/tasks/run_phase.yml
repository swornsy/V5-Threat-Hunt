---

# ========================================================================

# CYBER RANGE ENGINE - RUN PHASE HANDLER (roles/engine/tasks/run_phase.yml)

# ========================================================================


# ------------------------------------------------------------------------

# Normalize Phase Formatting Strings

# ------------------------------------------------------------------------

- name: Normalize phase formatting strings

  set_fact:

    normalized_phase: "{{ master_loop_phase | string | trim | lower | replace('_', '-') }}"

    phase_fact_safe: "{{ master_loop_phase | string | trim | lower | replace('-', '_') }}"

  tags: engine


# ------------------------------------------------------------------------

# Evaluate Host Foothold Compromise Status

# ------------------------------------------------------------------------

- name: Evaluate Host Foothold Compromise Status

  set_fact:

    is_compromised: "{{ inventory_hostname in (hostvars['localhost']['compromised_hosts'] | default([])) or (inventory_hostname | split('.') | first) in (hostvars['localhost']['compromised_hosts'] | default([])) }}"

  tags: engine


# ------------------------------------------------------------------------

# Safe Execution Eligibility Guard using standard boolean facts

# ------------------------------------------------------------------------

- name: Calculate Phase Execution Eligibility

  set_fact:

    should_run_phase: "{{ not (hostvars[inventory_hostname]['phase_done_' + phase_fact_safe] is defined) and (inventory_hostname == hostvars['localhost']['patient_zero_host'] or normalized_phase in ['persistence', 'privilege-escalation', 'lateral-movement', 'command-and-control', 'exfiltration']) }}"

  tags: engine


# ------------------------------------------------------------------------

# Parse Phase Specific and Fallback Pools

# ------------------------------------------------------------------------

- name: Build phase-specific technique list

  set_fact:

    phase_techniques: "{{ attack_sequence | selectattr('phase', 'equalto', normalized_phase) | list | default([]) }}"

  when: should_run_phase | bool

  tags: engine


- name: Filter out already executed techniques from current phase

  set_fact:

    phase_techniques: "{{ phase_techniques | rejectattr('technique', 'in', used_techniques | default([])) | list }}"

  when: should_run_phase | bool

  tags: engine


- name: Build fallback global technique pool (All unused actions)

  set_fact:

    global_techniques: "{{ attack_sequence | rejectattr('technique', 'in', used_techniques | default([])) | list }}"

  when: should_run_phase | bool

  tags: engine


# ------------------------------------------------------------------------

# Pacing Calculations

# ------------------------------------------------------------------------

- name: Determine campaign technique pacing execution limits

  set_fact:

    selected_count: "{{ (1 if attack_behaviour == 'stealthy' else (range(1, 3) | random)) }}"

  when: should_run_phase | bool

  tags: engine


# ------------------------------------------------------------------------

# Select techniques for execution (Fallback to Global Pool if Empty)

# ------------------------------------------------------------------------

- name: Select techniques for execution (Fallback to Global Pool if Empty)

  set_fact:

    selected_phase_techniques: "{{ (((phase_techniques if (phase_techniques | length > 0) else global_techniques) | shuffle)[0:(selected_count | int)]) }}"

    "selection_done_{{ current_variable_phase_key }}": true

  vars:

    current_variable_phase_key: "{{ normalized_phase | replace('-', '_') }}"

  when: 

    - should_run_phase | bool

    - hostvars[inventory_hostname]['selection_done_' + (normalized_phase | replace('-', '_'))] is not defined

  tags: engine


# ------------------------------------------------------------------------

# Execute Selected Operations

# ------------------------------------------------------------------------

- name: Execute Cyber Range Techniques

  include_tasks: execute_technique.yml

  vars:

    selected_action: "{{ technique }}"

    current_phase: "{{ normalized_phase }}"

  loop: "{{ selected_phase_techniques | default([]) | unique(attribute='technique') }}"

  loop_control:

    loop_var: technique

  when:

    - should_run_phase | bool

    - selected_phase_techniques is defined

    - selected_phase_techniques | length > 0

    - is_compromised | bool

  tags: engine


# ------------------------------------------------------------------------

# Complete Phase Tracks

# ------------------------------------------------------------------------

- name: Mark phase as completed

  set_fact:

    "phase_done_{{ phase_fact_safe }}": true

  when: should_run_phase | bool

  tags: engine
